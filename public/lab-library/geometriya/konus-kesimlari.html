<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Konus Kesmalari | Ellips, Parabola, Giperbola | 3D Interaktiv</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #080820;
            color: #f0f4ff;
        }
        canvas { display: block; }
        
        .header {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 32, 0.94);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 8px 28px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            z-index: 30;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .header .title {
            font-size: 1.1rem;
            font-weight: 900;
            background: linear-gradient(135deg, #64c8ff, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            font-size: 0.5rem;
            color: #6688aa;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .main-panel {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 32, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 25;
            min-width: 340px;
            max-width: 600px;
            width: 92%;
            pointer-events: auto;
        }
        .main-panel .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 120px;
        }
        .slider-group label {
            font-size: 0.5rem;
            font-weight: 700;
            color: #6688aa;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .slider-group input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #64c8ff, #a855f7, #ff6b6b);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #64c8ff, #3b82f6);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(100,200,255,0.3);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .slider-group .slider-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            color: #64c8ff;
            min-width: 40px;
            text-align: center;
        }
        
        .btn {
            padding: 5px 12px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(100,200,255,0.15); }
        .btn-blue { background: linear-gradient(135deg, #64c8ff, #3b82f6); color: white; }
        .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
        .btn-red { background: linear-gradient(135deg, #ff6b6b, #dc2626); color: white; }
        .btn-green { background: linear-gradient(135deg, #34d399, #059669); color: white; }
        .btn-gold { background: linear-gradient(135deg, #ffb432, #f59e0b); color: #1a0a0a; }
        .btn-gray { background: rgba(80,100,140,0.15); color: #88aacc; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gray:hover { background: rgba(80,100,140,0.3); }
        .btn-sm { font-size: 0.4rem; padding: 3px 8px; }
        
        .conic-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .conic-btn {
            padding: 3px 12px;
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            color: #88aacc;
            font-size: 0.55rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;

        .conic-btn:hover { background: rgba(255,255,255,0.05); transform: scale(1.05); }
        .conic-btn.active-ellipse { border-color: #64c8ff; color: #64c8ff; background: rgba(100,200,255,0.1); }
        .conic-btn.active-parabola { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.1); }
        .conic-btn.active-hyperbola { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.1); }
        
        .info-panel {
            position: absolute;
            top: 65px;
            left: 16px;
            background: rgba(8, 8, 32, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 20;
            pointer-events: none;
            min-width: 160px;
        }
        .info-panel .label {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6688aa;
            font-weight: 700;
        }
        .info-panel .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            color: #64c8ff;
        }
        .info-panel .desc {
            font-size: 0.45rem;
            color: #88aacc;
            margin-top: 2px;
        }
        .info-panel .equation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            color: #ffb432;
            margin-top: 4px;
            padding: 3px 8px;
            background: rgba(255,180,50,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,180,50,0.05);
        }
        
        .graph-container {
            position: absolute;
            top: 65px;
            right: 16px;
            background: rgba(8, 8, 32, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid rgba(100, 200, 255, 0.06);
            z-index: 20;
            pointer-events: none;
            min-width: 160px;
            max-width: 200px;
        }
        .graph-container .g-title {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6688aa;
            font-weight: 700;
            text-align: center;
        }
        .graph-container canvas {
            width: 100%;
            height: 70px;
            border-radius: 8px;
        }
        
        .eccentricity-display {
            position: absolute;
            bottom: 130px;
            right: 16px;
            background: rgba(8, 8, 32, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.04);
            z-index: 18;
            pointer-events: none;
            text-align: center;
        }
        .eccentricity-display .e-label {
            font-size: 0.4rem;
            text-transform: uppercase;
            color: #6688aa;
            letter-spacing: 1px;
        }
        .eccentricity-display .e-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.0rem;
            font-weight: 700;
            color: #ffb432;
        }
        .eccentricity-display .e-desc {
            font-size: 0.4rem;
            color: #88aacc;
        }
        
        @media (max-width: 768px) {
            .header { top: 8px; padding: 4px 16px; }
            .header .title { font-size: 0.8rem; }
            .info-panel { top: 55px; left: 8px; min-width: 120px; padding: 6px 10px; }
            .info-panel .value { font-size: 0.7rem; }
            .info-panel .equation { font-size: 0.45rem; }
            .graph-container { top: 55px; right: 8px; min-width: 120px; max-width: 150px; padding: 4px 8px; }
            .graph-container canvas { height: 50px; }
            .main-panel { bottom: 50px; padding: 8px 12px; min-width: 280px; }
            .slider-group { min-width: 80px; }
            .slider-group label { font-size: 0.4rem; }
            .slider-group .slider-val { font-size: 0.55rem; min-width: 35px; }
            .btn { font-size: 0.4rem; padding: 3px 8px; }
            .conic-btn { font-size: 0.45rem; padding: 2px 8px; }
            .eccentricity-display { bottom: 110px; right: 8px; padding: 4px 10px; }
            .eccentricity-display .e-value { font-size: 0.8rem; }
        }
        @media (max-width: 480px) {
            .info-panel { display: none; }
            .graph-container { top: 50px; right: 4px; min-width: 90px; max-width: 110px; padding: 4px 6px; }
            .graph-container canvas { height: 35px; }
            .main-panel { bottom: 40px; padding: 6px 8px; min-width: 200px; }
            .slider-group { min-width: 50px; }
            .slider-group input[type="range"] { height: 3px; }
            .slider-group input[type="range"]::-webkit-slider-thumb { width: 12px; height: 12px; }
            .btn { font-size: 0.35rem; padding: 2px 5px; }
            .conic-btn { font-size: 0.35rem; padding: 1px 5px; }
            .eccentricity-display { bottom: 90px; right: 4px; padding: 2px 6px; }
            .eccentricity-display .e-value { font-size: 0.6rem; }
            .eccentricity-display .e-label { font-size: 0.3rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📐 Konus Kesmalari</div>
        <div class="subtitle">Ellips · Parabola · Giperbola | 3D Interaktiv</div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <div class="label">📐 Konus kesimi</div>
        <div class="value" id="conicType">Ellips</div>
        <div class="desc" id="conicDesc">a = 2.00, b = 1.20</div>
        <div class="equation" id="equationDisplay">x²/4 + y²/1.44 = 1</div>
    </div>
    
    <div class="graph-container">
        <div class="g-title">📈 Grafik</div>
        <canvas id="graphCanvas"></canvas>
    </div>
    
    <div class="eccentricity-display">
        <div class="e-label">Ekssentrisitet</div>
        <div class="e-value" id="eccentricityValue">0.80</div>
        <div class="e-desc" id="eccentricityDesc">Ellips</div>
    </div>
    
    <div class="main-panel">
        <div class="row">
            <div class="slider-group">
                <label>📏 a (yarim o'q)</label>
                <input type="range" id="sliderA" min="0.5" max="4" step="0.05" value="2.0">
                <span class="slider-val" id="sliderAVal">2.00</span>
            </div>
            <div class="slider-group">
                <label>📏 b (yarim o'q)</label>
                <input type="range" id="sliderB" min="0.3" max="3" step="0.05" value="1.2">
                <span class="slider-val" id="sliderBVal">1.20</span>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;">
            <div class="conic-buttons">
                <button class="conic-btn active-ellipse" data-type="ellipse">🔵 Ellips</button>
                <button class="conic-btn" data-type="parabola">🟢 Parabola</button>
                <button class="conic-btn" data-type="hyperbola">🔴 Giperbola</button>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;gap:4px;">
            <button class="btn btn-blue btn-sm" id="btnCircle">○ Aylana</button>
            <button class="btn btn-green btn-sm" id="btnParabolaStd">⊃ Standart</button>
            <button class="btn btn-red btn-sm" id="btnHyperbolaStd">⊃ Standart</button>
            <button class="btn btn-gold btn-sm" id="btnReset">↺ Reset</button>
            <button class="btn btn-gray btn-sm" id="btnAnimate">▶ Anim</button>
        </div>
        
        <div class="row" style="margin-top:4px;font-size:0.4rem;color:#445566;font-family:'JetBrains Mono',monospace;" id="formulaDisplay">
            x²/4.00 + y²/1.44 = 1
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ========== THREE.JS SCENE ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080820);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(0, 2.5, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 2;
        controls.maxDistance = 15;
        
        // --- Lights ---
        const ambient = new THREE.AmbientLight(0x223355, 0.5);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x64c8ff, 0.15);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);
        
        // --- Ground ---
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x080820, 
            roughness: 0.9, 
            metalness: 0.05, 
            transparent: true, 
            opacity: 0.3 
        });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(6, 32), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- Grid ---
        const gridHelper = new THREE.GridHelper(8, 8, 0x4488ff, 0x224488);
        gridHelper.position.y = -0.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.08;
        scene.add(gridHelper);
        
        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 80 + 10;
            starPos[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.05, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ========== CONIC SECTION ==========
        let conicGroup = new THREE.Group();
        scene.add(conicGroup);
        
        let conicLine = null;
        let conicPoints = [];
        let conicType = 'ellipse';
        let a = 2.0, b = 1.2;
        let isAnimating = false;
        let animationId = null;
        let animParam = 0;
        
        // ========== DRAW CONIC ==========
        function drawConic() {
            // Remove old conic
            while(conicGroup.children.length > 0) {
                conicGroup.remove(conicGroup.children[0]);
            }
            
            const points = [];
            const segments = 200;
            
            if (conicType === 'ellipse') {
                // Ellipse: x²/a² + y²/b² = 1
                for (let i = 0; i <= segments; i++) {
                    const t = (i / segments) * Math.PI * 2;
                    const x = a * Math.cos(t);
                    const z = b * Math.sin(t);
                    points.push(new THREE.Vector3(x, 0.01, z));
                }
            } else if (conicType === 'parabola') {
                // Parabola: y² = 4px  =>  x = y²/(4p)
                const p = a * 0.8;
                const range = Math.min(4, a * 1.5);
                for (let i = 0; i <= segments; i++) {
                    const t = (i / segments) * 2 - 1;
                    const y = t * range;
                    const x = (y * y) / (4 * p);
                    points.push(new THREE.Vector3(x, 0.01, y));
                }
            } else if (conicType === 'hyperbola') {
                // Hyperbola: x²/a² - y²/b² = 1
                const range = Math.min(4, a * 1.8);
                // Right branch
                for (let i = 0; i <= segments/2; i++) {
                    const t = (i / (segments/2)) * 1.5;
                    const x = a * Math.cosh(t);
                    const z = b * Math.sinh(t);
                    points.push(new THREE.Vector3(x, 0.01, z));
                }
                // Left branch
                for (let i = 0; i <= segments/2; i++) {
                    const t = (i / (segments/2)) * 1.5;
                    const x = -a * Math.cosh(t);
                    const z = b * Math.sinh(t);
                    points.push(new THREE.Vector3(x, 0.01, z));
                }
                // Connect branches with asymptotes
            }
            
            // Create line
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const color = conicType === 'ellipse' ? 0x64c8ff : 
                         conicType === 'parabola' ? 0x34d399 : 0xff6b6b;
            const material = new THREE.LineBasicMaterial({ 
                color: color, 
                linewidth: 2,
                transparent: true,
                opacity: 0.9
            });
            conicLine = new THREE.Line(geometry, material);
            conicGroup.add(conicLine);
            
            // Add glow effect
            const glowMat = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.15
            });
            const glowLine = new THREE.Line(geometry.clone(), glowMat);
            glowLine.position.y = -0.02;
            conicGroup.add(glowLine);
            
            // Add axes
            const axisMat = new THREE.LineBasicMaterial({ 
                color: 0x446688, 
                transparent: true, 
                opacity: 0.1 
            });
            const axisPoints = [
                new THREE.Vector3(-4, 0.01, 0),
                new THREE.Vector3(4, 0.01, 0)
            ];
            const axisGeo = new THREE.BufferGeometry().setFromPoints(axisPoints);
            const axisLine = new THREE.Line(axisGeo, axisMat);
            conicGroup.add(axisLine);
            
            const axisPointsZ = [
                new THREE.Vector3(0, 0.01, -4),
                new THREE.Vector3(0, 0.01, 4)
            ];
            const axisGeoZ = new THREE.BufferGeometry().setFromPoints(axisPointsZ);
            const axisLineZ = new THREE.Line(axisGeoZ, axisMat);
            conicGroup.add(axisLineZ);
            
            // Add foci for ellipse and hyperbola
            if (conicType === 'ellipse' || conicType === 'hyperbola') {
                const c = Math.sqrt(Math.abs(a*a - b*b));
                const fociColor = conicType === 'ellipse' ? 0xffb432 : 0xff6b6b;
                const focusMat = new THREE.MeshStandardMaterial({
                    color: fociColor,
                    emissive: fociColor,
                    emissiveIntensity: 0.3
                });
                const focus1 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), focusMat);
                focus1.position.set(c, 0.01, 0);
                conicGroup.add(focus1);
                const focus2 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), focusMat);
                focus2.position.set(-c, 0.01, 0);
                conicGroup.add(focus2);
            }
            
            // Update UI
            updateUI();
            updateGraph();
        }
        
        // ========== UPDATE UI ==========
        function updateUI() {
            const typeNames = {
                'ellipse': 'Ellips',
                'parabola': 'Parabola',
                'hyperbola': 'Giperbola'
            };
            const typeColors = {
                'ellipse': '#64c8ff',
                'parabola': '#34d399',
                'hyperbola': '#ff6b6b'
            };
            
            document.getElementById('conicType').textContent = typeNames[conicType];
            document.getElementById('conicType').style.color = typeColors[conicType];
            
            let desc = '';
            let equation = '';
            let ecc = 0;
            
            if (conicType === 'ellipse') {
                desc = `a = ${a.toFixed(2)}, b = ${b.toFixed(2)}`;
                equation = `x²/${(a*a).toFixed(2)} + y²/${(b*b).toFixed(2)} = 1`;
                ecc = Math.sqrt(1 - (b*b)/(a*a));
                if (Math.abs(a - b) < 0.01) {
                    desc = 'Aylana (maxsus hol)';
                    equation = `x² + y² = ${(a*a).toFixed(2)}`;
                    ecc = 0;
                }
            } else if (conicType === 'parabola') {
                const p = a * 0.8;
                desc = `p = ${p.toFixed(2)}`;
                equation = `y² = ${(4*p).toFixed(2)}x`;
                ecc = 1;
            } else if (conicType === 'hyperbola') {
                desc = `a = ${a.toFixed(2)}, b = ${b.toFixed(2)}`;
                equation = `x²/${(a*a).toFixed(2)} - y²/${(b*b).toFixed(2)} = 1`;
                ecc = Math.sqrt(1 + (b*b)/(a*a));
            }
            
            document.getElementById('conicDesc').textContent = desc;
            document.getElementById('equationDisplay').textContent = equation;
            document.getElementById('formulaDisplay').textContent = equation;
            
            document.getElementById('eccentricityValue').textContent = ecc.toFixed(4);
            if (ecc < 0.001) {
                document.getElementById('eccentricityDesc').textContent = 'Aylana (e=0)';
            } else if (ecc < 1) {
                document.getElementById('eccentricityDesc').textContent = 'Ellips (0<e<1)';
            } else if (Math.abs(ecc - 1) < 0.001) {
                document.getElementById('eccentricityDesc').textContent = 'Parabola (e=1)';
            } else {
                document.getElementById('eccentricityDesc').textContent = 'Giperbola (e>1)';
            }
        }
        
        // ========== GRAPH ==========
        function updateGraph() {
            const canvas = document.getElementById('graphCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 16 || 160;
            canvas.height = rect.height - 16 || 60;
            
            const w = canvas.width;
            const h = canvas.height;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, w, h);
            
            // Background
            ctx.fillStyle = 'rgba(8,8,32,0.3)';
            ctx.fillRect(0, 0, w, h);
            
            const padding = 10;
            const drawW = w - 2 * padding;
            const drawH = h - 2 * padding;
            const midX = w / 2;
            const midY = h / 2;
            const scale = Math.min(drawW, drawH) / 4;
            
            // Grid
            ctx.strokeStyle = 'rgba(68,136,255,0.04)';
            ctx.lineWidth = 0.5;
            for (let i = -4; i <= 4; i++) {
                const px = midX + i * scale;
                const py = midY - i * scale;
                ctx.beginPath();
                ctx.moveTo(px, padding);
                ctx.lineTo(px, h - padding);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(padding, py);
                ctx.lineTo(w - padding, py);
                ctx.stroke();
            }
            
            // Axes
            ctx.strokeStyle = 'rgba(68,136,255,0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(padding, midY);
            ctx.lineTo(w - padding, midY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(midX, padding);
            ctx.lineTo(midX, h - padding);
            ctx.stroke();
            
            // Draw conic
            const color = conicType === 'ellipse' ? '#64c8ff' : 
                         conicType === 'parabola' ? '#34d399' : '#ff6b6b';
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            const segments = 100;
            let first = true;
            
            if (conicType === 'ellipse') {
                for (let i = 0; i <= segments; i++) {
                    const t = (i / segments) * Math.PI * 2;
                    const x = a * Math.cos(t);
                    const y = b * Math.sin(t);
                    const px = midX + x * scale;
                    const py = midY - y * scale;
                    if (px >= padding && px <= w - padding && py >= padding && py <= h - padding) {
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                }
            } else if (conicType === 'parabola') {
                const p = a * 0.8;
                const range = Math.min(4, a * 1.5);
                for (let i = 0; i <= segments; i++) {
                    const t = (i / segments) * 2 - 1;
                    const y = t * range;
                    const x = (y * y) / (4 * p);
                    const px = midX + x * scale;
                    const py = midY - y * scale;
                    if (px >= padding && px <= w - padding && py >= padding && py <= h - padding) {
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                }
            } else if (conicType === 'hyperbola') {
                const range = Math.min(4, a * 1.8);
                // Right branch
                for (let i = 0; i <= segments/2; i++) {
                    const t = (i / (segments/2)) * 1.5;
                    const x = a * Math.cosh(t);
                    const y = b * Math.sinh(t);
                    const px = midX + x * scale;
                    const py = midY - y * scale;
                    if (px >= padding && px <= w - padding && py >= padding && py <= h - padding) {
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                }
                first = true;
                // Left branch
                for (let i = 0; i <= segments/2; i++) {
                    const t = (i / (segments/2)) * 1.5;
                    const x = -a * Math.cosh(t);
                    const y = b * Math.sinh(t);
                    const px = midX + x * scale;
                    const py = midY - y * scale;
                    if (px >= padding && px <= w - padding && py >= padding && py <= h - padding) {
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                }
            }
            ctx.stroke();
            
            // Foci
            if (conicType === 'ellipse' || conicType === 'hyperbola') {
                const c = Math.sqrt(Math.abs(a*a - b*b));
                ctx.fillStyle = '#ffb432';
                ctx.beginPath();
                ctx.arc(midX + c * scale, midY, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(midX - c * scale, midY, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // ========== UPDATE SCENE ==========
        function updateScene() {
            document.getElementById('sliderAVal').textContent = a.toFixed(2);
            document.getElementById('sliderBVal').textContent = b.toFixed(2);
            document.getElementById('sliderA').value = a;
            document.getElementById('sliderB').value = b;
            drawConic();
        }
        
        // ========== SLIDERS ==========
        document.getElementById('sliderA').addEventListener('input', (e) => {
            a = parseFloat(e.target.value);
            if (conicType === 'ellipse' && a < b) {
                b = a * 0.6;
                document.getElementById('sliderB').value = b;
            }
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        document.getElementById('sliderB').addEventListener('input', (e) => {
            b = parseFloat(e.target.value);
            if (conicType === 'ellipse' && b > a) {
                a = b * 1.2;
                document.getElementById('sliderA').value = a;
            }
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        // ========== CONIC TYPE BUTTONS ==========
        document.querySelectorAll('.conic-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.conic-btn').forEach(b => {
                    b.className = 'conic-btn';
                });
                conicType = btn.dataset.type;
                btn.classList.add('active-' + conicType);
                
                // Reset parameters for each type
                if (conicType === 'ellipse') {
                    a = 2.0; b = 1.2;
                } else if (conicType === 'parabola') {
                    a = 1.5; b = 1.0;
                } else if (conicType === 'hyperbola') {
                    a = 1.5; b = 1.0;
                }
                document.getElementById('sliderA').value = a;
                document.getElementById('sliderB').value = b;
                
                if (isAnimating) {
                    isAnimating = false;
                    if (animationId) cancelAnimationFrame(animationId);
                    document.getElementById('btnAnimate').textContent = '▶ Anim';
                }
                updateScene();
            });
        });
        
        // ========== PRESET BUTTONS ==========
        document.getElementById('btnCircle').addEventListener('click', () => {
            conicType = 'ellipse';
            a = 2.0; b = 2.0;
            document.getElementById('sliderA').value = a;
            document.getElementById('sliderB').value = b;
            document.querySelectorAll('.conic-btn').forEach(b => b.className = 'conic-btn');
            document.querySelector('[data-type="ellipse"]').classList.add('active-ellipse');
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        document.getElementById('btnParabolaStd').addEventListener('click', () => {
            conicType = 'parabola';
            a = 1.5; b = 1.0;
            document.getElementById('sliderA').value = a;
            document.getElementById('sliderB').value = b;
            document.querySelectorAll('.conic-btn').forEach(b => b.className = 'conic-btn');
            document.querySelector('[data-type="parabola"]').classList.add('active-parabola');
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        document.getElementById('btnHyperbolaStd').addEventListener('click', () => {
            conicType = 'hyperbola';
            a = 1.5; b = 1.0;
            document.getElementById('sliderA').value = a;
            document.getElementById('sliderB').value = b;
            document.querySelectorAll('.conic-btn').forEach(b => b.className = 'conic-btn');
            document.querySelector('[data-type="hyperbola"]').classList.add('active-hyperbola');
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        document.getElementById('btnReset').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            a = 2.0; b = 1.2;
            document.getElementById('sliderA').value = a;
            document.getElementById('sliderB').value = b;
            conicType = 'ellipse';
            document.querySelectorAll('.conic-btn').forEach(b => b.className = 'conic-btn');
            document.querySelector('[data-type="ellipse"]').classList.add('active-ellipse');
            updateScene();
        });
        
        // ========== ANIMATION ==========
        document.getElementById('btnAnimate').addEventListener('click', () => {
            isAnimating = !isAnimating;
            document.getElementById('btnAnimate').textContent = isAnimating ? '⏹ Stop' : '▶ Anim';
            if (isAnimating) {
                animParam = 0;
                const startA = a;
                const startB = b;
                const targetA = conicType === 'ellipse' ? 3.5 : 
                               conicType === 'parabola' ? 2.5 : 2.5;
                const targetB = conicType === 'ellipse' ? 0.5 : 1.5;
                const startTime = performance.now();
                const duration = 4000;
                
                function animateConic(time) {
                    if (!isAnimating) return;
                    const progress = Math.min(1, (time - startTime) / duration);
                    const eased = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    a = startA + (targetA - startA) * eased;
                    b = startB + (targetB - startB) * eased;
                    document.getElementById('sliderA').value = a;
                    document.getElementById('sliderB').value = b;
                    updateScene();
                    if (progress < 1) {
                        animationId = requestAnimationFrame(animateConic);
                    } else {
                        isAnimating = false;
                        document.getElementById('btnAnimate').textContent = '▶ Anim';
                    }
                }
                animationId = requestAnimationFrame(animateConic);
            } else {
                if (animationId) cancelAnimationFrame(animationId);
            }
        });
        
        // ========== RESIZE ==========
        function resizeCanvas() {
            updateGraph();
        }
        window.addEventListener('resize', resizeCanvas);
        
        // ========== 3D ANIMATION LOOP ==========
        function animate3D() {
            requestAnimationFrame(animate3D);
            
            const time = performance.now() / 1000;
            
            // Rotate scene slightly
            if (conicGroup) {
                conicGroup.rotation.y = Math.sin(time * 0.05) * 0.1;
            }
            
            // Stars
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // ========== INIT ==========
        updateScene();
        animate3D();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
        
        console.log('📐 Konus Kesmalari | 3D Laboratoriya');
        console.log('📊 Ellips, Parabola, Giperbola');
        console.log('🔵 Ekssentrisitet orqali konus kesmalarini o\'rganing');
    </script>
