// ============================================================

// ============================================================
// 2. 3D MATEMATIKA
// ============================================================
class Vector3 {
    constructor(x=0, y=0, z=0) {
        this.x = x; this.y = y; this.z = z;
    }
    add(v) { return new Vector3(this.x+v.x, this.y+v.y, this.z+v.z); }
    sub(v) { return new Vector3(this.x-v.x, this.y-v.y, this.z-v.z); }
    mul(s) { return new Vector3(this.x*s, this.y*s, this.z*s); }
    len() { return Math.sqrt(this.x*this.x + this.y*this.y + this.z*this.z); }
    norm() { const l=this.len(); return l>0 ? this.mul(1/l) : new Vector3(); }
    dot(v) { return this.x*v.x + this.y*v.y + this.z*v.z; }
    cross(v) {
        return new Vector3(
            this.y*v.z - this.z*v.y,
            this.z*v.x - this.x*v.z,
            this.x*v.y - this.y*v.x
        );
    }
    clone() { return new Vector3(this.x, this.y, this.z); }
}

function rotateX(p, angle) {
    const c=Math.cos(angle), s=Math.sin(angle);
    return new Vector3(p.x, p.y*c-p.z*s, p.y*s+p.z*c);
}
function rotateY(p, angle) {
    const c=Math.cos(angle), s=Math.sin(angle);
    return new Vector3(p.x*c+p.z*s, p.y, -p.x*s+p.z*c);
}
function rotateZ(p, angle) {
    const c=Math.cos(angle), s=Math.sin(angle);
    return new Vector3(p.x*c-p.y*s, p.x*s+p.y*c, p.z);
}

function project(p, fov=450) {
    const z = p.z + 10;
    if (z < 0.1) return null;
    const scale = fov / z;
    return { x: p.x * scale + W/2, y: -p.y * scale + H/2, z: z };
}

// ============================================================
// 4. HOLAT
// ============================================================
const state = {
    molecule: 'metan',
    showLabels: true,
    autoRotate: true,
    rotX: 0.3,
    rotY: 0.5,
    rotZ: 0.1,
    zoom: 1,
    mouseX: 0,
    mouseY: 0,
    isDragging: false,
    lastMX: 0,
    lastMY: 0
};

// ============================================================
// 5. RENDER
// ============================================================
function render() {
    ctx.clearRect(0, 0, W, H);

    const mol = molecules[state.molecule];
    if (!mol) return;

    // Atomlarni yig'ish
    const atoms = [];
    const atomTypes = {};

    // Uglerod
    mol.atoms.C.forEach(pos => {
        atoms.push({ type: 'C', pos: new Vector3(pos.x, pos.y, pos.z), radius: 0.5 });
    });
    atomTypes.C = mol.atoms.C.length;

    // Vodorod
    mol.atoms.H.forEach(pos => {
        atoms.push({ type: 'H', pos: new Vector3(pos.x, pos.y, pos.z), radius: 0.3 });
    });
    atomTypes.H = mol.atoms.H.length;

    // Rotatsiya
    let rotAtoms = atoms.map(a => {
        let p = a.pos.clone();
        p = rotateX(p, state.rotX);
        p = rotateY(p, state.rotY);
        p = rotateZ(p, state.rotZ);
        return { ...a, pos: p };
    });

    // Proyeksiya
    const projAtoms = rotAtoms.map(a => {
        const p = project(a.pos);
        return { ...a, proj: p };
    });

    // Bog'larni chizish
    mol.bonds.forEach((bond, idx) => {
        const fromIdx = bond.from === 'C' ? 0 : mol.atoms.C.length;
        const toIdx = bond.to === 'C' ? 0 : mol.atoms.C.length;

        // Qaysi atomlar bog'lanishini aniqlash
        const fromAtom = bond.from === 'C'
            ? rotAtoms[bond.fromIndex || 0]
            : rotAtoms[mol.atoms.C.length + (bond.fromIndex || 0)];
        const toAtom = bond.to === 'C'
            ? rotAtoms[bond.toIndex || 0]
            : rotAtoms[mol.atoms.C.length + (bond.toIndex || 0)];

        // Bog' indekslarini to'g'irlash
        let fi = 0, ti = 0;
        if (bond.from === 'C') {
            fi = bond.fromIndex || 0;
        } else {
            fi = mol.atoms.C.length + (bond.fromIndex || 0);
        }
        if (bond.to === 'C') {
            ti = bond.toIndex || 0;
        } else {
            ti = mol.atoms.C.length + (bond.toIndex || 0);
        }

        const p1 = projAtoms[fi];
        const p2 = projAtoms[ti];

        if (p1 && p1.proj && p2 && p2.proj) {
            drawBond(p1.proj, p2.proj, bond.type);
        }
    });

    // Atomlarni chizish
    projAtoms.forEach((a, i) => {
        if (a.proj) {
            const color = a.type === 'C' ? '#444444' : '#ffffff';
            drawAtom(a.proj, a.radius, color, a.type);
        }
    });

    // Yorliqlar
    if (state.showLabels) {
        projAtoms.forEach((a, i) => {
            if (a.proj && a.proj.z > 0) {
                const label = a.type === 'C' ? 'C' : 'H';
                const color = a.type === 'C' ? '#888888' : '#aaaacc';
                ctx.fillStyle = color;
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 8;
                ctx.fillText(label, a.proj.x, a.proj.y - a.radius * 25 - 8);
                ctx.shadowBlur = 0;
            }
        });
    }

    // Ma'lumot paneli
    updateInfo(mol);
}

function drawAtom(p, radius, color, type) {
    const r = radius * 20 * state.zoom;

    // Glow
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 1.5);
    if (type === 'C') {
        grad.addColorStop(0, 'rgba(80,80,80,0.6)');
        grad.addColorStop(0.5, 'rgba(60,60,60,0.3)');
        grad.addColorStop(1, 'rgba(60,60,60,0)');
    } else {
        grad.addColorStop(0, 'rgba(200,220,255,0.4)');
        grad.addColorStop(0.5, 'rgba(180,200,255,0.2)');
        grad.addColorStop(1, 'rgba(180,200,255,0)');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r * 1.5, 0, Math.PI*2);
    ctx.fill();

    // Soya
    const shadowGrad = ctx.createRadialGradient(p.x - r*0.3, p.y - r*0.3, 0, p.x, p.y, r);
    shadowGrad.addColorStop(0, 'rgba(255,255,255,0.3)');
    shadowGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = shadowGrad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();

    // Atom
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 10;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Chegara
    ctx.strokeStyle = type === 'C' ? 'rgba(100,100,100,0.5)' : 'rgba(200,200,255,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
}

function drawBond(p1, p2, type) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);

    const colors = {
        single: '#66ddff',
        double: '#ffdd44',
        triple: '#ff6644'
    };

    const widths = {
        single: 3,
        double: 4,
        triple: 4
    };

    const color = colors[type] || '#66ddff';
    const width = widths[type] || 3;

    ctx.save();
    ctx.translate(p1.x, p1.y);
    ctx.rotate(angle);

    if (type === 'single') {
        ctx.shadowColor = 'rgba(100,200,255,0.2)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = color;
        ctx.fillRect(0, -width/2, len, width);
        ctx.shadowBlur = 0;
    } else if (type === 'double') {
        const offset = 3;
        ctx.shadowColor = 'rgba(255,200,50,0.2)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = color;
        ctx.fillRect(0, -width/2 - offset, len, width*0.6);
        ctx.fillRect(0, width/2 + offset - width*0.6, len, width*0.6);
        ctx.shadowBlur = 0;
    } else if (type === 'triple') {
        const offset = 4;
        ctx.shadowColor = 'rgba(255,100,50,0.2)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = color;
        ctx.fillRect(0, -width/2 - offset, len, width*0.5);
        ctx.fillRect(0, -width/2, len, width*0.5);
        ctx.fillRect(0, width/2 + offset - width*0.5, len, width*0.5);
        ctx.shadowBlur = 0;
    }

    ctx.restore();
}

// ============================================================
// 6. MA'LUMOT PANELI
// ============================================================
function updateInfo(mol) {
    document.getElementById('molName').textContent = mol.name;
    document.getElementById('molFormula').textContent = mol.formula;
    document.getElementById('molDesc').textContent = mol.desc;
    document.getElementById('cCount').textContent = mol.atoms.C.length;
    document.getElementById('hCount').textContent = mol.atoms.H.length;
    document.getElementById('bondCount').textContent = mol.bonds.length;
    document.getElementById('groupName').textContent = mol.group;
}

// ============================================================
// 7. MOUSE BOSHQARUVI
// ============================================================
canvas.addEventListener('mousedown', (e) => {
    state.isDragging = true;
    state.lastMX = e.clientX;
    state.lastMY = e.clientY;
    canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
    if (state.isDragging) {
        const dx = e.clientX - state.lastMX;
        const dy = e.clientY - state.lastMY;
        state.rotY += dx * 0.005;
        state.rotX += dy * 0.005;
        state.lastMX = e.clientX;
        state.lastMY = e.clientY;
    }
});

window.addEventListener('mouseup', () => {
    state.isDragging = false;
    canvas.style.cursor = 'grab';
});

// Zoom
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.05 : -0.05;
    state.zoom = Math.max(0.5, Math.min(2, state.zoom + delta));
}, { passive: false });

// ============================================================
// 8. BOSHQARUV TUGMALARI
// ============================================================
document.getElementById('toggleRotate').addEventListener('click', function() {
    state.autoRotate = !state.autoRotate;
    this.classList.toggle('active');
});

document.getElementById('toggleLabels').addEventListener('click', function() {
    state.showLabels = !state.showLabels;
    this.classList.toggle('active');
});

document.getElementById('resetView').addEventListener('click', function() {
    state.rotX = 0.3;
    state.rotY = 0.5;
    state.rotZ = 0.1;
    state.zoom = 1;
});

// Molekula tanlash
document.querySelectorAll('#molecule-selector button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('#molecule-selector button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        state.molecule = this.dataset.molecule;
    });
});

// ============================================================
// 9. EKRAN O'LCHAMIGA MOSLASH
// ============================================================
window.addEventListener('resize', resize);

// ============================================================
// 10. ANIMATSIYA
// ============================================================
function animate() {
    if (state.autoRotate) {
        state.rotY += 0.005;
        state.rotX += 0.001;
    }
    render();
    requestAnimationFrame(animate);
}

// ============================================================
// 11. ISHGA TUSHIRISH
// ============================================================
animate();
