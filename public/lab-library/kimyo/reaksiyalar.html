<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kimyoviy Reaksiyalar | 3D Interaktiv Laboratoriya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #0a0a1a;
            color: #f0f4ff;
        }
        canvas { display: block; }
        
        .header {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.94);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 8px 28px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            z-index: 30;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .header .title {
            font-size: 1.1rem;
            font-weight: 900;
            background: linear-gradient(135deg, #34d399, #64c8ff, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            font-size: 0.5rem;
            color: #6688aa;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .main-panel {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 25;
            min-width: 340px;
            max-width: 650px;
            width: 94%;
            pointer-events: auto;
            max-height: 45vh;
            overflow-y: auto;
        }
        .main-panel::-webkit-scrollbar { width: 2px; }
        .main-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .main-panel::-webkit-scrollbar-thumb { background: #64c8ff; border-radius: 4px; }
        .main-panel .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }
        
        .reaction-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .reaction-btn {
            padding: 4px 12px;
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            color: #88aacc;
            font-size: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
        }
        .reaction-btn:hover { background: rgba(255,255,255,0.05); transform: scale(1.05); }
        .reaction-btn.active-combination { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .reaction-btn.active-decomposition { border-color: #64c8ff; color: #64c8ff; background: rgba(100,200,255,0.1); }
        .reaction-btn.active-replacement { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.1); }
        .reaction-btn.active-double { border-color: #a855f7; color: #a855f7; background: rgba(168,85,247,0.1); }
        .reaction-btn.active-combustion { border-color: #fb923c; color: #fb923c; background: rgba(251,146,60,0.1); }
        .reaction-btn.active-neutralization { border-color: #f472b6; color: #f472b6; background: rgba(244,114,182,0.1); }
        
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.45rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(100,200,255,0.15); }
        .btn-blue { background: linear-gradient(135deg, #64c8ff, #3b82f6); color: white; }
        .btn-red { background: linear-gradient(135deg, #ff6b6b, #dc2626); color: white; }
        .btn-green { background: linear-gradient(135deg, #34d399, #059669); color: white; }
        .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
        .btn-gold { background: linear-gradient(135deg, #ffb432, #f59e0b); color: #1a0a0a; }
        .btn-gray { background: rgba(80,100,140,0.15); color: #88aacc; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gray:hover { background: rgba(80,100,140,0.3); }
        .btn-sm { font-size: 0.4rem; padding: 2px 6px; }
        
        .info-panel {
            position: absolute;
            top: 65px;
            left: 16px;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 20;
            pointer-events: none;
            min-width: 160px;
            max-width: 220px;
        }
        .info-panel .label {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6688aa;
            font-weight: 700;
        }
        .info-panel .value {
            font-size: 0.65rem;
            font-weight: 700;
            margin-top: 2px;
        }
        .info-panel .equation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: #ffb432;
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(255,180,50,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,180,50,0.05);
            word-break: break-all;
        }
        .info-panel .desc {
            font-size: 0.4rem;
            color: #88aacc;
            margin-top: 2px;
        }
        
        .molecule-container {
            position: absolute;
            top: 65px;
            right: 16px;
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 8px 12px;
            border: 1px solid rgba(100, 200, 255, 0.06);
            z-index: 20;
            pointer-events: none;
            min-width: 120px;
            max-width: 160px;
        }
        .molecule-container .m-title {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6688aa;
            font-weight: 700;
            text-align: center;
        }
        .molecule-container canvas {
            width: 100%;
            height: 60px;
            border-radius: 8px;
        }
        
        .reaction-type-display {
            position: absolute;
            bottom: 120px;
            right: 16px;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.04);
            z-index: 18;
            pointer-events: none;
            text-align: center;
        }
        .reaction-type-display .rt-label {
            font-size: 0.35rem;
            text-transform: uppercase;
            color: #6688aa;
            letter-spacing: 1px;
        }
        .reaction-type-display .rt-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            color: #ffb432;
        }
        .reaction-type-display .rt-desc {
            font-size: 0.4rem;
            color: #88aacc;
        }
        
        @media (max-width: 768px) {
            .header { top: 8px; padding: 4px 16px; }
            .header .title { font-size: 0.8rem; }
            .info-panel { top: 55px; left: 8px; min-width: 120px; max-width: 160px; padding: 6px 10px; }
            .info-panel .value { font-size: 0.55rem; }
            .info-panel .equation { font-size: 0.4rem; }
            .molecule-container { top: 55px; right: 8px; min-width: 90px; max-width: 120px; padding: 4px 8px; }
            .molecule-container canvas { height: 40px; }
            .main-panel { bottom: 45px; padding: 8px 12px; min-width: 280px; max-height: 50vh; }
            .reaction-btn { font-size: 0.4rem; padding: 3px 8px; }
            .btn { font-size: 0.4rem; padding: 3px 6px; }
            .reaction-type-display { bottom: 100px; right: 8px; padding: 4px 8px; }
            .reaction-type-display .rt-value { font-size: 0.6rem; }
        }
        @media (max-width: 480px) {
            .info-panel { display: none; }
            .molecule-container { top: 50px; right: 4px; min-width: 70px; max-width: 90px; padding: 4px 6px; }
            .molecule-container canvas { height: 30px; }
            .main-panel { bottom: 40px; padding: 6px 8px; min-width: 200px; max-height: 55vh; }
            .reaction-btn { font-size: 0.35rem; padding: 2px 5px; }
            .btn { font-size: 0.35rem; padding: 2px 4px; }
            .reaction-type-display { bottom: 85px; right: 4px; padding: 2px 6px; }
            .reaction-type-display .rt-value { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🧪 Kimyoviy Reaksiyalar</div>
        <div class="subtitle">Turlari va Tenglamalari | 3D Interaktiv</div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <div class="label">🧪 Reaksiya turi</div>
        <div class="value" id="reactionType" style="color:#ff6b6b;">Birlashish</div>
        <div class="equation" id="equationDisplay">A + B → AB</div>
        <div class="desc" id="reactionDesc">Ikki yoki undan ortiq modda birlashib, murakkab modda hosil qiladi</div>
    </div>
    
    <div class="molecule-container">
        <div class="m-title">🔬 Molekula</div>
        <canvas id="moleculeCanvas"></canvas>
    </div>
    
    <div class="reaction-type-display">
        <div class="rt-label">📊 Reaksiya</div>
        <div class="rt-value" id="rtValue">A + B → AB</div>
        <div class="rt-desc" id="rtDesc">Birlashish</div>
    </div>
    
    <div class="main-panel">
        <div class="row">
            <div class="reaction-buttons">
                <button class="reaction-btn active-combination" data-type="combination">🔴 Birlashish</button>
                <button class="reaction-btn" data-type="decomposition">🔵 Parchalanish</button>
                <button class="reaction-btn" data-type="replacement">🟢 O'rin almashtirish</button>
                <button class="reaction-btn" data-type="double">🟣 Ikki karra</button>
                <button class="reaction-btn" data-type="combustion">🟠 Yonish</button>
                <button class="reaction-btn" data-type="neutralization">🩷 Neytrallash</button>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;gap:4px;">
            <button class="btn btn-red btn-sm" id="btnShowEquation">📐 Tenglama</button>
            <button class="btn btn-blue btn-sm" id="btnBalance">⚖️ Balans</button>
            <button class="btn btn-green btn-sm" id="btnAnimate">▶ Animatsiya</button>
            <button class="btn btn-gold btn-sm" id="btnReset">↺ Reset</button>
            <button class="btn btn-gray btn-sm" id="btnRandom">🎲 Random</button>
        </div>
        
        <div class="row" style="margin-top:4px;font-size:0.4rem;color:#445566;font-family:'JetBrains Mono',monospace;text-align:center;width:100%;" id="formulaDisplay">
            🧪 Reaksiya turini tanlang
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ========== THREE.JS SCENE ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 2;
        controls.maxDistance = 15;
        
        // --- Lights ---
        const ambient = new THREE.AmbientLight(0x223355, 0.5);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x64c8ff, 0.15);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);
        
        // --- Ground ---
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a1a, 
            roughness: 0.9, 
            metalness: 0.05, 
            transparent: true, 
            opacity: 0.3 
        });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(6, 32), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- Grid ---
        const gridHelper = new THREE.GridHelper(8, 8, 0x4488ff, 0x224488);
        gridHelper.position.y = -0.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.08;
        scene.add(gridHelper);
        
        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 80 + 10;
            starPos[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.05, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ========== REACTION DATA ==========
        const reactions = {
            combination: {
                name: 'Birlashish',
                color: '#ff6b6b',
                equation: 'A + B → AB',
                balanced: '2A + B₂ → 2AB',
                desc: 'Ikki yoki undan ortiq modda birlashib, murakkab modda hosil qiladi',
                example: '2H₂ + O₂ → 2H₂O',
                atoms: { A: 2, B: 2 }
            },
            decomposition: {
                name: 'Parchalanish',
                color: '#64c8ff',
                equation: 'AB → A + B',
                balanced: '2AB → 2A + B₂',
                desc: 'Murakkab modda oddiy moddalarga parchalanadi',
                example: '2H₂O → 2H₂ + O₂',
                atoms: { A: 2, B: 2 }
            },
            replacement: {
                name: 'O\'rin almashtirish',
                color: '#34d399',
                equation: 'A + BC → AC + B',
                balanced: 'A + BC → AC + B',
                desc: 'Oddiy modda murakkab moddadagi elementni siqib chiqaradi',
                example: 'Zn + CuSO₄ → ZnSO₄ + Cu',
                atoms: { A: 1, B: 1, C: 1 }
            },
            double: {
                name: 'Ikki karra almashtirish',
                color: '#a855f7',
                equation: 'AB + CD → AD + CB',
                balanced: 'AB + CD → AD + CB',
                desc: 'Ikki murakkab modda o\'zaro ionlarni almashtiradi',
                example: 'NaCl + AgNO₃ → NaNO₃ + AgCl',
                atoms: { A: 1, B: 1, C: 1, D: 1 }
            },
            combustion: {
                name: 'Yonish',
                color: '#fb923c',
                equation: 'CₓHᵧ + O₂ → CO₂ + H₂O',
                balanced: 'C₃H₈ + 5O₂ → 3CO₂ + 4H₂O',
                desc: 'Modda kislorod bilan reaksiyaga kirishib, issiqlik va yorug\'lik chiqaradi',
                example: 'CH₄ + 2O₂ → CO₂ + 2H₂O',
                atoms: { C: 1, H: 4, O: 2 }
            },
            neutralization: {
                name: 'Neytrallash',
                color: '#f472b6',
                equation: 'HA + BOH → BA + H₂O',
                balanced: 'HCl + NaOH → NaCl + H₂O',
                desc: 'Kislota va asos o\'zaro ta\'sirlashib, tuz va suv hosil qiladi',
                example: 'H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O',
                atoms: { H: 1, A: 1, B: 1, O: 1 }
            }
        };
        
        let currentType = 'combination';
        let isAnimating = false;
        let animationId = null;
        let moleculeGroup = new THREE.Group();
        scene.add(moleculeGroup);
        
        // ========== DRAW MOLECULES ==========
        function drawMolecules(type) {
            // Clear old molecules
            while(moleculeGroup.children.length > 0) {
                moleculeGroup.remove(moleculeGroup.children[0]);
            }
            
            const reaction = reactions[type];
            const color = parseInt(reaction.color.replace('#', ''), 16);
            
            // Create atoms based on reaction type
            const atoms = [];
            const positions = [];
            const colors = [];
            
            // Different atom arrangements for each reaction type
            if (type === 'combination') {
                // A + B → AB
                atoms.push({ label: 'A', color: 0xff6b6b, pos: [-1.2, 0, 0] });
                atoms.push({ label: 'B', color: 0x64c8ff, pos: [1.2, 0, 0] });
                atoms.push({ label: 'AB', color: 0xffb432, pos: [0, 0, 2.5], size: 0.7 });
            } else if (type === 'decomposition') {
                // AB → A + B
                atoms.push({ label: 'AB', color: 0xffb432, pos: [0, 0, -2.5], size: 0.7 });
                atoms.push({ label: 'A', color: 0xff6b6b, pos: [-1.2, 0, 2.5] });
                atoms.push({ label: 'B', color: 0x64c8ff, pos: [1.2, 0, 2.5] });
            } else if (type === 'replacement') {
                // A + BC → AC + B
                atoms.push({ label: 'A', color: 0xff6b6b, pos: [-1.5, 0, -1] });
                atoms.push({ label: 'B', color: 0x64c8ff, pos: [1.5, 0, -1] });
                atoms.push({ label: 'C', color: 0x34d399, pos: [0.5, 0.5, -1] });
                atoms.push({ label: 'AC', color: 0xffb432, pos: [-0.5, 0, 2], size: 0.6 });
                atoms.push({ label: 'B', color: 0x64c8ff, pos: [1.5, 0, 2] });
            } else if (type === 'double') {
                // AB + CD → AD + CB
                atoms.push({ label: 'A', color: 0xff6b6b, pos: [-1.2, 0, -1.5] });
                atoms.push({ label: 'B', color: 0x64c8ff, pos: [1.2, 0, -1.5] });
                atoms.push({ label: 'C', color: 0x34d399, pos: [-1.2, 0.5, -1.5] });
                atoms.push({ label: 'D', color: 0xa855f7, pos: [1.2, 0.5, -1.5] });
                atoms.push({ label: 'AD', color: 0xffb432, pos: [-0.5, 0, 2], size: 0.6 });
                atoms.push({ label: 'CB', color: 0xfb923c, pos: [0.5, 0.5, 2], size: 0.6 });
            } else if (type === 'combustion') {
                // CH₄ + O₂ → CO₂ + H₂O
                atoms.push({ label: 'CH₄', color: 0x34d399, pos: [-1.5, 0, -1.5], size: 0.6 });
                atoms.push({ label: 'O₂', color: 0x64c8ff, pos: [1.5, 0, -1.5], size: 0.5 });
                atoms.push({ label: 'CO₂', color: 0xff6b6b, pos: [-0.5, 0, 2], size: 0.6 });
                atoms.push({ label: 'H₂O', color: 0x64c8ff, pos: [0.5, 0.5, 2], size: 0.5 });
            } else if (type === 'neutralization') {
                // HA + BOH → BA + H₂O
                atoms.push({ label: 'HCl', color: 0xff6b6b, pos: [-1.2, 0, -1.5], size: 0.5 });
                atoms.push({ label: 'NaOH', color: 0x64c8ff, pos: [1.2, 0, -1.5], size: 0.5 });
                atoms.push({ label: 'NaCl', color: 0xffb432, pos: [-0.5, 0, 2], size: 0.6 });
                atoms.push({ label: 'H₂O', color: 0x64c8ff, pos: [0.5, 0.5, 2], size: 0.5 });
            }
            
            // Create 3D atoms
            atoms.forEach(atom => {
                const size = atom.size || 0.45;
                const sphereMat = new THREE.MeshStandardMaterial({
                    color: atom.color,
                    emissive: atom.color,
                    emissiveIntensity: 0.15,
                    metalness: 0.2,
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.9
                });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 24, 24), sphereMat);
                sphere.position.set(atom.pos[0], atom.pos[1] || 0, atom.pos[2] || 0);
                sphere.castShadow = true;
                moleculeGroup.add(sphere);
                
                // Glow
                const glowMat = new THREE.MeshBasicMaterial({
                    color: atom.color,
                    transparent: true,
                    opacity: 0.08
                });
                const glow = new THREE.Mesh(new THREE.SphereGeometry(size * 1.6, 16, 16), glowMat);
                glow.position.copy(sphere.position);
                moleculeGroup.add(glow);
                
                // Label
                if (atom.label) {
                    const div = document.createElement('div');
                    div.textContent = atom.label;
                    div.style.color = '#ccddff';
                    div.style.fontSize = '10px';
                    div.style.fontWeight = '700';
                    div.style.fontFamily = 'JetBrains Mono, monospace';
                    div.style.textShadow = '0 0 20px rgba(0,0,0,0.9)';
                    div.style.background = 'rgba(10,10,26,0.6)';
                    div.style.padding = '1px 6px';
                    div.style.borderRadius = '12px';
                    div.style.border = '1px solid rgba(255,255,255,0.05)';
                    const label = new CSS2DObject(div);
                    label.position.set(atom.pos[0], (atom.pos[1] || 0) + size + 0.4, atom.pos[2] || 0);
                    moleculeGroup.add(label);
                }
            });
            
            // Add arrows for reaction direction
            const arrowMat = new THREE.LineBasicMaterial({ 
                color: 0xffb432, 
                transparent: true, 
                opacity: 0.4 
            });
            const arrowPoints = [
                new THREE.Vector3(0, 0, -0.5),
                new THREE.Vector3(0, 0, 0.5)
            ];
            const arrowGeo = new THREE.BufferGeometry().setFromPoints(arrowPoints);
            const arrow = new THREE.Line(arrowGeo, arrowMat);
            moleculeGroup.add(arrow);
            
            // Add arrow head
            const headMat = new THREE.MeshBasicMaterial({ color: 0xffb432, transparent: true, opacity: 0.3 });
            const head = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.15, 8), headMat);
            head.position.set(0, 0, 0.6);
            head.rotation.x = Math.PI / 2;
            moleculeGroup.add(head);
        }
        
        // ========== UPDATE SCENE ==========
        function updateScene() {
            const reaction = reactions[currentType];
            
            // Update UI
            document.getElementById('reactionType').textContent = reaction.name;
            document.getElementById('reactionType').style.color = reaction.color;
            document.getElementById('equationDisplay').textContent = reaction.equation;
            document.getElementById('reactionDesc').textContent = reaction.desc;
            document.getElementById('rtValue').textContent = reaction.equation;
            document.getElementById('rtDesc').textContent = reaction.name;
            document.getElementById('formulaDisplay').innerHTML = `🧪 ${reaction.name} reaksiyasi: ${reaction.example}`;
            
            // Update button active states
            document.querySelectorAll('.reaction-btn').forEach(btn => {
                btn.className = 'reaction-btn';
                if (btn.dataset.type === currentType) {
                    btn.classList.add('active-' + currentType);
                }
            });
            
            // Draw molecules
            drawMolecules(currentType);
            drawMoleculeCanvas(currentType);
        }
        
        // ========== MOLECULE CANVAS ==========
        function drawMoleculeCanvas(type) {
            const canvas = document.getElementById('moleculeCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width - 16 || 120;
            canvas.height = rect.height - 16 || 50;
            
            const w = canvas.width;
            const h = canvas.height;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, w, h);
            
            const reaction = reactions[type];
            ctx.fillStyle = 'rgba(10,10,26,0.3)';
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = reaction.color;
            ctx.font = '12px JetBrains Mono, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(reaction.equation, w/2, h/2);
            
            ctx.font = '8px JetBrains Mono, monospace';
            ctx.fillStyle = '#6688aa';
            ctx.fillText(reaction.name, w/2, h - 8);
        }
        
        // ========== REACTION TYPE BUTTONS ==========
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentType = btn.dataset.type;
                if (isAnimating) {
                    isAnimating = false;
                    if (animationId) cancelAnimationFrame(animationId);
                    document.getElementById('btnAnimate').textContent = '▶ Animatsiya';
                }
                updateScene();
            });
        });
        
        // ========== ANIMATION ==========
        document.getElementById('btnAnimate').addEventListener('click', () => {
            isAnimating = !isAnimating;
            document.getElementById('btnAnimate').textContent = isAnimating ? '⏹ Stop' : '▶ Animatsiya';
            if (isAnimating) {
                const types = ['combination', 'decomposition', 'replacement', 'double', 'combustion', 'neutralization'];
                let index = types.indexOf(currentType);
                const startTime = performance.now();
                const duration = 3000;
                
                function animateReaction(time) {
                    if (!isAnimating) return;
                    const progress = Math.min(1, (time - startTime) / duration);
                    if (progress >= 1) {
                        index = (index + 1) % types.length;
                        currentType = types[index];
                        updateScene();
                        const startTime2 = performance.now();
                        const duration2 = 3000;
                        function animateReaction2(time2) {
                            if (!isAnimating) return;
                            const progress2 = Math.min(1, (time2 - startTime2) / duration2);
                            if (progress2 >= 1) {
                                index = (index + 1) % types.length;
                                currentType = types[index];
                                updateScene();
                                const startTime3 = performance.now();
                                const duration3 = 3000;
                                function animateReaction3(time3) {
                                    if (!isAnimating) return;
                                    const progress3 = Math.min(1, (time3 - startTime3) / duration3);
                                    if (progress3 >= 1) {
                                        isAnimating = false;
                                        document.getElementById('btnAnimate').textContent = '▶ Animatsiya';
                                        return;
                                    }
                                    animationId = requestAnimationFrame(animateReaction3);
                                }
                                animationId = requestAnimationFrame(animateReaction3);
                                return;
                            }
                            animationId = requestAnimationFrame(animateReaction2);
                        }
                        animationId = requestAnimationFrame(animateReaction2);
                        return;
                    }
                    // Rotate molecules during animation
                    moleculeGroup.rotation.y = progress * Math.PI * 2;
                    animationId = requestAnimationFrame(animateReaction);
                }
                animationId = requestAnimationFrame(animateReaction);
            } else {
                if (animationId) cancelAnimationFrame(animationId);
                moleculeGroup.rotation.y = 0;
            }
        });
        
        // ========== OTHER BUTTONS ==========
        document.getElementById('btnShowEquation').addEventListener('click', () => {
            const reaction = reactions[currentType];
            alert(`📐 Reaksiya tenglamasi:\n${reaction.equation}\n\n📝 Balanslangan:\n${reaction.balanced}\n\n📌 Misol:\n${reaction.example}`);
        });
        
        document.getElementById('btnBalance').addEventListener('click', () => {
            const reaction = reactions[currentType];
            document.getElementById('equationDisplay').textContent = reaction.balanced;
            document.getElementById('rtValue').textContent = reaction.balanced;
            setTimeout(() => {
                document.getElementById('equationDisplay').textContent = reaction.equation;
                document.getElementById('rtValue').textContent = reaction.equation;
            }, 2000);
        });
        
        document.getElementById('btnReset').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Animatsiya';
            }
            currentType = 'combination';
            moleculeGroup.rotation.y = 0;
            updateScene();
        });
        
        document.getElementById('btnRandom').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Animatsiya';
            }
            const types = ['combination', 'decomposition', 'replacement', 'double', 'combustion', 'neutralization'];
            const randomType = types[Math.floor(Math.random() * types.length)];
            currentType = randomType;
            moleculeGroup.rotation.y = 0;
            updateScene();
        });
        
        // ========== RESIZE ==========
        function resizeCanvas() {
            drawMoleculeCanvas(currentType);
        }
        window.addEventListener('resize', resizeCanvas);
        
        // ========== 3D ANIMATION LOOP ==========
        function animate3D() {
            requestAnimationFrame(animate3D);
            
            const time = performance.now() / 1000;
            
            // Float molecules
            if (!isAnimating) {
                moleculeGroup.position.y = Math.sin(time * 0.5) * 0.05;
            }
            
            // Stars
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // ========== INIT ==========
        updateScene();
        animate3D();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
        
        console.log('🧪 Kimyoviy Reaksiyalar | 3D Laboratoriya');
        console.log('📊 Reaksiya turlari: Birlashish, Parchalanish, O\'rin almashtirish, Ikki karra, Yonish, Neytrallash');
    </script>
</body>
</html>
