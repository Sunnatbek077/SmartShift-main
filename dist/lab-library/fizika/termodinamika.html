<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Termodinamika 3D | Ilmiy laboratoriya | Kuchaytirilgan versiya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #060614;
            color: #f0f4ff;
        }
        canvas {
            display: block;
        }
        
        .info-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(8, 10, 28, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px 20px;
            border: 1px solid rgba(255, 100, 60, 0.25);
            z-index: 20;
            pointer-events: none;
            max-width: 320px;
        }
        .info-panel .badge {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff6644;
            font-weight: 700;
        }
        .info-panel h1 {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6644, #ffaa44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 2px 0;
        }
        .info-panel .formula {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(255,100,60,0.12);
            padding: 3px 12px;
            border-radius: 30px;
            color: #ffaa88;
            display: inline-block;
            border: 1px solid rgba(255,100,60,0.15);
        }
        
        .stats-panel {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(8, 10, 28, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 14px 20px;
            border: 1px solid rgba(255,100,60,0.12);
            z-index: 20;
            pointer-events: none;
            min-width: 320px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px 20px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .stat-item .label {
            color: #6688aa;
        }
        .stat-item .value {
            color: #ffaa66;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        .stat-item .value.highlight {
            color: #44ffaa;
        }
        
        .control-panel {
            position: absolute;
            bottom: 16px;
            right: 16px;
            background: rgba(8, 10, 28, 0.94);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 16px 20px;
            border: 1px solid rgba(255,100,60,0.15);
            z-index: 25;
            pointer-events: auto;
            min-width: 320px;
            max-width: 380px;
        }
        .control-panel label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6688aa;
            display: block;
            margin: 6px 0 2px;
        }
        .slider-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 600;
            color: #aaccee;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #ff6644, #ffaa44);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff8866, #ff4422);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,100,60,0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }
        .btn-group {
            display: flex;
            gap: 6px;
            margin: 8px 0 4px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.15s;
            flex: 1;
            min-width: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6644, #dd4422);
            color: white;
            box-shadow: 0 4px 20px rgba(255,100,60,0.15);
        }
        .btn-primary:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(255,100,60,0.3);
        }
        .btn-blue {
            background: linear-gradient(135deg, #44aaff, #2288dd);
            color: white;
        }
        .btn-blue:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(68,170,255,0.3);
        }
        .btn-green {
            background: linear-gradient(135deg, #44ffaa, #22dd88);
            color: #0a1a1a;
        }
        .btn-green:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(68,255,170,0.3);
        }
        .btn-purple {
            background: linear-gradient(135deg, #aa66ff, #8844dd);
            color: white;
        }
        .btn-purple:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 30px rgba(170,102,255,0.3);
        }
        .btn-gray {
            background: rgba(80, 100, 140, 0.25);
            color: #88aacc;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-gray:hover {
            background: rgba(80, 100, 140, 0.4);
            transform: scale(1.04);
        }
        .btn-sm {
            font-size: 0.5rem;
            padding: 3px 10px;
            min-width: 30px;
        }
        
        .checkbox-group {
            display: flex;
            gap: 12px;
            margin: 6px 0 2px;
            flex-wrap: wrap;
        }
        .checkbox-group label {
            font-size: 0.55rem;
            text-transform: none;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #88aacc;
            font-weight: 500;
        }
        .checkbox-group input[type="checkbox"] {
            accent-color: #ff6644;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        
        .controls-tip {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.5rem;
            color: #6688aa;
            pointer-events: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.04);
        }
        
        .graph-mini {
            position: absolute;
            top: 80px;
            right: 16px;
            background: rgba(8, 10, 28, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 10px 14px;
            border: 1px solid rgba(255,100,60,0.08);
            z-index: 19;
            pointer-events: none;
            min-width: 140px;
        }
        .graph-mini .g-title {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6688aa;
            margin-bottom: 4px;
            font-weight: 700;
        }
        .graph-mini .g-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.5rem;
            color: #88aacc;
            padding: 1px 0;
        }
        .graph-mini .g-bar .track {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            overflow: hidden;
        }
        .graph-mini .g-bar .fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.15s;
        }
        .graph-mini .g-bar .fill.p {
            background: linear-gradient(90deg, #ff6644, #ffaa44);
        }
        .graph-mini .g-bar .fill.v {
            background: linear-gradient(90deg, #44aaff, #aa66ff);
        }
        .graph-mini .g-bar .fill.t {
            background: linear-gradient(90deg, #ff4466, #ff8844);
        }
        
        @media (max-width: 860px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 2px 12px;
            }
            .stats-panel {
                min-width: 240px;
                padding: 10px 14px;
            }
            .stats-panel .stat-item {
                font-size: 0.7rem;
            }
            .control-panel {
                min-width: 260px;
                max-width: 290px;
                padding: 12px 14px;
            }
            .btn {
                font-size: 0.55rem;
                padding: 4px 8px;
                min-width: 36px;
            }
            .info-panel {
                max-width: 240px;
                padding: 10px 14px;
            }
            .graph-mini {
                display: none;
            }
            .controls-tip {
                display: none;
            }
        }
        @media (max-width: 600px) {
            .info-panel {
                top: 8px;
                left: 8px;
                max-width: 180px;
                padding: 8px 12px;
            }
            .info-panel h1 {
                font-size: 0.9rem;
            }
            .stats-panel {
                bottom: 8px;
                left: 8px;
                min-width: 160px;
                padding: 8px 10px;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0 6px;
            }
            .stats-panel .stat-item {
                font-size: 0.55rem;
            }
            .control-panel {
                bottom: 8px;
                right: 8px;
                min-width: 180px;
                padding: 10px 12px;
            }
            .btn {
                font-size: 0.45rem;
                padding: 2px 6px;
                min-width: 28px;
            }
            .checkbox-group label {
                font-size: 0.45rem;
            }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <div class="badge">🔥 Termodinamika</div>
        <h1>Ilmiy laboratoriya</h1>
        <div class="formula">ΔU = Q - A | PV = nRT</div>
    </div>
    
    <div class="graph-mini" id="graphMini">
        <div class="g-title">📊 Gaz parametrlari</div>
        <div class="g-bar"><span>p</span><div class="track"><div class="fill p" id="gP" style="width:0%"></div></div></div>
        <div class="g-bar"><span>V</span><div class="track"><div class="fill v" id="gV" style="width:0%"></div></div></div>
        <div class="g-bar"><span>T</span><div class="track"><div class="fill t" id="gT" style="width:0%"></div></div></div>
    </div>
    
    <div class="stats-panel" id="statsPanel">
        <div class="stats-grid">
            <div class="stat-item"><span class="label">🌡️ T</span><span class="value" id="tempVal">300 K</span></div>
            <div class="stat-item"><span class="label">📦 V</span><span class="value" id="volVal">1.00 L</span></div>
            <div class="stat-item"><span class="label">⚡ p</span><span class="value highlight" id="pressVal">101.3 kPa</span></div>
            <div class="stat-item"><span class="label">🔥 U</span><span class="value" id="energyVal">3.74 kJ</span></div>
            <div class="stat-item"><span class="label">⚙️ A</span><span class="value" id="workVal">0.00 J</span></div>
            <div class="stat-item"><span class="label">🔋 Q</span><span class="value" id="heatVal">0.00 J</span></div>
        </div>
    </div>
    
    <div class="control-panel">
        <div class="slider-row"><span>🌡️ T</span><span id="tempSliderVal">300 K</span></div>
        <input type="range" id="tempSlider" min="100" max="800" step="5" value="300">
        <div class="slider-row"><span>📦 V</span><span id="volSliderVal">1.00 L</span></div>
        <input type="range" id="volSlider" min="0.3" max="3.0" step="0.05" value="1.0">
        
        <div style="font-size:0.55rem; color:#66ccaa; text-align:center; margin:2px 0; font-weight:600; font-family:'JetBrains Mono',monospace;" id="formulaDisplay">PV = nRT | p = 101.3 kPa</div>
        
        <div class="checkbox-group">
            <label><input type="checkbox" id="showParticles" checked> ⚛️ Zarrachalar</label>
            <label><input type="checkbox" id="showGrid" checked> 📐 To'r</label>
            <label><input type="checkbox" id="autoRotate"> 🔄 Aylanish</label>
            <label><input type="checkbox" id="showLabels" checked> 🏷️ Yorliqlar</label>
        </div>
        
        <div class="btn-group">
            <button id="btnHeat" class="btn btn-primary">🔥 Isitish</button>
            <button id="btnCool" class="btn btn-blue">❄️ Sovutish</button>
            <button id="btnCompress" class="btn btn-purple">⬇️ Siqish</button>
            <button id="btnExpand" class="btn btn-green">⬆️ Kengaytirish</button>
        </div>
        <div class="btn-group">
            <button id="btnIsobar" class="btn btn-blue btn-sm">Izobarik</button>
            <button id="btnIsothermal" class="btn btn-green btn-sm">Izotermik</button>
            <button id="btnIsochoric" class="btn btn-purple btn-sm">Izoxorik</button>
            <button id="btnAdiabatic" class="btn btn-primary btn-sm">Adiabatik</button>
            <button id="btnReset" class="btn btn-gray btn-sm">⟳ Qayta</button>
        </div>
    </div>
    <div class="controls-tip">🖱️ Aylantirish · Scroll: Zoom</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- SAHNA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x060614);
        scene.fog = new THREE.FogExp2(0x060614, 0.005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 10);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Boshqaruv ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0.8, 0);
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        
        // --- Yorug'lik ---
        const ambient = new THREE.AmbientLight(0x223355, 0.6);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);
        const rimLight = new THREE.DirectionalLight(0xff6644, 0.4);
        rimLight.position.set(-3, 2, -4);
        scene.add(rimLight);
        const fillLight = new THREE.PointLight(0x4488ff, 0.3);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        const glowLight = new THREE.PointLight(0xff6644, 0.2);
        glowLight.position.set(0, 2, -2);
        scene.add(glowLight);
        
        // --- Zamin ---
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x080820, roughness: 0.8, metalness: 0.1, transparent: true, opacity: 0.4 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(16, 10), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.8;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- Panjara ---
        let gridHelper = new THREE.GridHelper(16, 20, 0x4488ff, 0x224488);
        gridHelper.position.y = -0.7;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // --- Yulduzlar ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 2500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 250;
            starPos[i*3+1] = (Math.random() - 0.5) * 80 + 5;
            starPos[i*3+2] = (Math.random() - 0.5) * 150 - 70;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const color = new THREE.Color().setHSL(0.55 + Math.random() * 0.15, 0.6, 0.6 + Math.random() * 0.4);
            starColors[i*3] = color.r;
            starColors[i*3+1] = color.g;
            starColors[i*3+2] = color.b;
        }
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.08, transparent: true, opacity: 0.6, vertexColors: true });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- IDISH ---
        const containerMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, transparent: true, opacity: 0.15, metalness: 0.3 });
        const container = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.2, 2.5, 48), containerMat);
        container.position.set(0, 0.2, 0);
        container.castShadow = true;
        scene.add(container);
        
        // Chegara chiziqlari
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.15 });
        const edgeGeo = new THREE.EdgesGeometry(container.geometry);
        const edgeLine = new THREE.LineSegments(edgeGeo, edgeMat);
        edgeLine.position.copy(container.position);
        scene.add(edgeLine);
        
        // --- GAZ (dinamik sfera) ---
        const gasMat = new THREE.MeshStandardMaterial({ color: 0xff6644, transparent: true, opacity: 0.5 });
        const gasSphere = new THREE.Mesh(new THREE.SphereGeometry(1.0, 64, 64), gasMat);
        gasSphere.position.set(0, 0.2, 0);
        gasSphere.castShadow = true;
        scene.add(gasSphere);
        
        // Halol
        const glowGasMat = new THREE.MeshBasicMaterial({ color: 0xff6644, transparent: true, opacity: 0.06 });
        const glowGas = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), glowGasMat);
        gasSphere.add(glowGas);
        
        // --- MOLEKULALAR ---
        const particleMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x442200 });
        const particles = [];
        const particleCount = 150;
        
        function createParticles() {
            for (let i = 0; i < particleCount; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), particleMat.clone());
                p.userData = {
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    vz: (Math.random() - 0.5) * 1.5
                };
                p.position.x = (Math.random() - 0.5) * 2.4;
                p.position.y = (Math.random() - 0.5) * 2 + 0.2;
                p.position.z = (Math.random() - 0.5) * 2.4;
                p.castShadow = true;
                scene.add(p);
                particles.push(p);
            }
        }
        
        // --- YORLIQLAR (CSS2D) ---
        let labelObjects = [];
        
        function createLabels(visible = true) {
            labelObjects.forEach(l => scene.remove(l));
            labelObjects = [];
            if (!visible) return;
            
            const labelData = [
                { text: '🔥 Gaz (ideal)', color: '#ff6644', x: 0, y: 1.8, z: 1.5 },
                { text: '⚛️ Molekulalar', color: '#ffaa66', x: 0, y: -0.3, z: 1.8 },
                { text: '📐 PV = nRT', color: '#44ffaa', x: -1.8, y: 1.4, z: 1.2 },
                { text: '⚡ ΔU = Q - A', color: '#ffdd99', x: 1.8, y: 1.4, z: 1.2 }
            ];
            
            labelData.forEach(d => {
                const div = document.createElement('div');
                div.textContent = d.text;
                div.style.backgroundColor = 'rgba(0,0,0,0.5)';
                div.style.color = d.color;
                div.style.fontSize = '10px';
                div.style.padding = '2px 12px';
                div.style.borderRadius = '30px';
                div.style.fontWeight = '600';
                div.style.backdropFilter = 'blur(8px)';
                div.style.border = '1px solid ' + d.color;
                const label = new CSS2DObject(div);
                label.position.set(d.x, d.y, d.z);
                scene.add(label);
                labelObjects.push(label);
            });
        }
        
        // ========== TERMODINAMIK PARAMETRLAR ==========
        const R = 8.314;
        const n = 1;
        const Cv = (3 / 2) * R;
        let temperature = 300;
        let volume = 1.0;
        let pressure = 0;
        let internalEnergy = 0;
        let workDone = 0;
        let heatAdded = 0;
        
        function updateThermodynamics() {
            const V_m3 = volume / 1000;
            const P_pa = (n * R * temperature) / V_m3;
            pressure = P_pa / 1000;
            internalEnergy = (3 / 2) * n * R * temperature;
            
            document.getElementById('tempVal').textContent = temperature.toFixed(0) + ' K';
            document.getElementById('volVal').textContent = volume.toFixed(2) + ' L';
            document.getElementById('pressVal').textContent = pressure.toFixed(1) + ' kPa';
            document.getElementById('energyVal').textContent = (internalEnergy / 1000).toFixed(2) + ' kJ';
            document.getElementById('workVal').textContent = workDone.toFixed(1) + ' J';
            document.getElementById('heatVal').textContent = heatAdded.toFixed(1) + ' J';
            document.getElementById('tempSliderVal').textContent = temperature.toFixed(0) + ' K';
            document.getElementById('volSliderVal').textContent = volume.toFixed(2) + ' L';
            document.getElementById('formulaDisplay').innerHTML = `PV = nRT | p = ${pressure.toFixed(1)} kPa | U = ${(internalEnergy/1000).toFixed(2)} kJ`;
            
            // Grafiklar
            document.getElementById('gP').style.width = Math.min(100, (pressure / 300) * 100) + '%';
            document.getElementById('gV').style.width = Math.min(100, (volume / 3) * 100) + '%';
            document.getElementById('gT').style.width = Math.min(100, ((temperature - 100) / 700) * 100) + '%';
            
            // Gaz radiusi
            const radius = Math.max(0.35, Math.min(1.5, volume / 1.8));
            gasSphere.scale.set(radius, radius, radius);
            
            // Rang
            const tFactor = (temperature - 100) / 700;
            const r = Math.min(1, 0.4 + tFactor * 0.6);
            const g = Math.min(1, 0.2 + tFactor * 0.8);
            const b = Math.min(0.5, 0.1 + tFactor * 0.4);
            gasMat.color.setRGB(r, g, b);
            
            // Zarrachalar
            const speedFactor = 0.4 + (temperature / 300) * 0.8;
            particles.forEach(p => {
                p.userData.vx += (Math.random() - 0.5) * 0.02 * (temperature / 300);
                p.userData.vy += (Math.random() - 0.5) * 0.02 * (temperature / 300);
                p.userData.vz += (Math.random() - 0.5) * 0.02 * (temperature / 300);
                const maxSpeed = 1.0 * (temperature / 300);
                ['vx', 'vy', 'vz'].forEach(axis => {
                    if (Math.abs(p.userData[axis]) > maxSpeed) p.userData[axis] *= 0.95;
                });
                p.material.color.setRGB(r, g, b);
                p.material.emissiveIntensity = 0.1 + tFactor * 0.4;
            });
        }
        
        function animateParticles(delta) {
            const speedFactor = 0.5 * (temperature / 300);
            particles.forEach(p => {
                p.position.x += p.userData.vx * delta * speedFactor;
                p.position.y += p.userData.vy * delta * speedFactor;
                p.position.z += p.userData.vz * delta * speedFactor;
                const limit = 1.1 * Math.max(0.5, volume / 1.8);
                if (Math.abs(p.position.x) > limit) {
                    p.position.x = Math.sign(p.position.x) * limit;
                    p.userData.vx *= -0.8;
                }
                if (Math.abs(p.position.y) > limit) {
                    p.position.y = Math.sign(p.position.y) * limit;
                    p.userData.vy *= -0.8;
                }
                if (Math.abs(p.position.z) > limit) {
                    p.position.z = Math.sign(p.position.z) * limit;
                    p.userData.vz *= -0.8;
                }
            });
        }
        
        // ========== SLAYDERS ==========
        const tempSlider = document.getElementById('tempSlider');
        const volSlider = document.getElementById('volSlider');
        
        function updateFromSliders() {
            const newTemp = parseFloat(tempSlider.value);
            const newVol = parseFloat(volSlider.value);
            const deltaV = (newVol - volume) / 1000;
            const P_avg = ((n * R * temperature) / (volume / 1000) + (n * R * newTemp) / (newVol / 1000)) / 2;
            const deltaWork = P_avg * deltaV;
            workDone += deltaWork;
            const deltaU = (3 / 2) * n * R * (newTemp - temperature);
            const deltaQ = deltaU + deltaWork;
            heatAdded += deltaQ;
            temperature = newTemp;
            volume = newVol;
            updateThermodynamics();
        }
        
        tempSlider.addEventListener('input', updateFromSliders);
        volSlider.addEventListener('input', updateFromSliders);
        
        // ========== TUGMALAR ==========
        document.getElementById('btnHeat').addEventListener('click', () => {
            tempSlider.value = Math.min(800, temperature + 50);
            updateFromSliders();
        });
        document.getElementById('btnCool').addEventListener('click', () => {
            tempSlider.value = Math.max(100, temperature - 50);
            updateFromSliders();
        });
        document.getElementById('btnCompress').addEventListener('click', () => {
            volSlider.value = Math.max(0.3, volume - 0.2);
            updateFromSliders();
        });
        document.getElementById('btnExpand').addEventListener('click', () => {
            volSlider.value = Math.min(3.0, volume + 0.2);
            updateFromSliders();
        });
        
        document.getElementById('btnIsobar').addEventListener('click', () => {
            const currentP = pressure;
            const newVol = Math.min(3.0, volume + 0.3);
            const newTemp = (currentP * 1000 * (newVol / 1000)) / (n * R);
            volSlider.value = newVol;
            tempSlider.value = Math.min(800, Math.max(100, newTemp));
            updateFromSliders();
        });
        document.getElementById('btnIsothermal').addEventListener('click', () => {
            const currentT = temperature;
            const newVol = Math.min(3.0, volume + 0.3);
            volSlider.value = newVol;
            tempSlider.value = currentT;
            updateFromSliders();
        });
        document.getElementById('btnIsochoric').addEventListener('click', () => {
            const currentV = volume;
            const newTemp = Math.min(800, temperature + 50);
            tempSlider.value = newTemp;
            volSlider.value = currentV;
            updateFromSliders();
        });
        document.getElementById('btnAdiabatic').addEventListener('click', () => {
            const gamma = 5 / 3;
            const V1 = volume / 1000;
            const T1 = temperature;
            const V2 = Math.min(3.0, volume + 0.2) / 1000;
            const T2 = T1 * Math.pow(V1 / V2, gamma - 1);
            volSlider.value = V2 * 1000;
            tempSlider.value = Math.min(800, Math.max(100, T2));
            const deltaU = (3 / 2) * n * R * (T2 - T1);
            workDone += -deltaU;
            heatAdded = 0;
            updateFromSliders();
            document.getElementById('heatVal').textContent = '0.0';
        });
        document.getElementById('btnReset').addEventListener('click', () => {
            temperature = 300;
            volume = 1.0;
            workDone = 0;
            heatAdded = 0;
            tempSlider.value = '300';
            volSlider.value = '1.0';
            updateFromSliders();
        });
        
        // ========== CHECKBOX ==========
        document.getElementById('showParticles').addEventListener('change', (e) => {
            particles.forEach(p => p.visible = e.target.checked);
        });
        document.getElementById('showGrid').addEventListener('change', (e) => {
            gridHelper.visible = e.target.checked;
        });
        document.getElementById('autoRotate').addEventListener('change', (e) => {
            controls.autoRotate = e.target.checked;
        });
        document.getElementById('showLabels').addEventListener('change', (e) => {
            createLabels(e.target.checked);
        });
        
        // ========== BOSHLASH ==========
        createParticles();
        createLabels(true);
        updateThermodynamics();
        
        // ========== ANIMATSIYA ==========
        let lastTime = performance.now() / 1000;
        
        function animate() {
            const now = performance.now() / 1000;
            let delta = Math.min(0.033, now - lastTime);
            if (delta < 0) delta = 0.016;
            lastTime = now;
            
            animateParticles(delta);
            stars.rotation.y += 0.0002;
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Termodinamika 3D | Kuchaytirilgan versiya | Ilmiy laboratoriya');
    </script>
</body>
</html>
