<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fazoda To'g'ri Chiziq va Tekislik | 3D Interaktiv</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #080818;
            color: #f0f4ff;
        }
        canvas { display: block; }
        
        .header {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 24, 0.94);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 8px 28px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            z-index: 30;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .header .title {
            font-size: 1.1rem;
            font-weight: 900;
            background: linear-gradient(135deg, #64c8ff, #a855f7, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            font-size: 0.5rem;
            color: #6688aa;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .main-panel {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 24, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 12px 18px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 25;
            min-width: 340px;
            max-width: 650px;
            width: 94%;
            pointer-events: auto;
            max-height: 45vh;
            overflow-y: auto;
        }
        .main-panel::-webkit-scrollbar { width: 2px; }
        .main-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .main-panel::-webkit-scrollbar-thumb { background: #64c8ff; border-radius: 4px; }
        .main-panel .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 100px;
        }
        .slider-group label {
            font-size: 0.45rem;
            font-weight: 700;
            color: #6688aa;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .slider-group input[type="range"] {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #64c8ff, #a855f7);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #64c8ff, #3b82f6);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(100,200,255,0.3);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .slider-group .slider-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: #64c8ff;
            min-width: 35px;
            text-align: center;
        }
        
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.45rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(100,200,255,0.15); }
        .btn-blue { background: linear-gradient(135deg, #64c8ff, #3b82f6); color: white; }
        .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
        .btn-red { background: linear-gradient(135deg, #ff6b6b, #dc2626); color: white; }
        .btn-green { background: linear-gradient(135deg, #34d399, #059669); color: white; }
        .btn-gold { background: linear-gradient(135deg, #ffb432, #f59e0b); color: #1a0a0a; }
        .btn-gray { background: rgba(80,100,140,0.15); color: #88aacc; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gray:hover { background: rgba(80,100,140,0.3); }
        .btn-sm { font-size: 0.4rem; padding: 2px 6px; }
        
        .mode-buttons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            padding: 3px 12px;
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
            color: #88aacc;
            font-size: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.05); transform: scale(1.05); }
        .mode-btn.active-line { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.1); }
        .mode-btn.active-plane { border-color: #64c8ff; color: #64c8ff; background: rgba(100,200,255,0.1); }
        .mode-btn.active-both { border-color: #34d399; color: #34d399; background: rgba(52,211,153,0.1); }
        
        .info-panel {
            position: absolute;
            top: 65px;
            left: 16px;
            background: rgba(8, 8, 24, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 20;
            pointer-events: none;
            min-width: 160px;
            max-width: 220px;
        }
        .info-panel .label {
            font-size: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6688aa;
            font-weight: 700;
        }
        .info-panel .value {
            font-size: 0.65rem;
            font-weight: 700;
            margin-top: 2px;
        }
        .info-panel .equation {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: #ffb432;
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(255,180,50,0.05);
            border-radius: 8px;
            border: 1px solid rgba(255,180,50,0.05);
            word-break: break-all;
        }
        .info-panel .desc {
            font-size: 0.4rem;
            color: #88aacc;
            margin-top: 2px;
        }
        
        .relation-display {
            position: absolute;
            bottom: 120px;
            right: 16px;
            background: rgba(8, 8, 24, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.04);
            z-index: 18;
            pointer-events: none;
            text-align: center;
        }
        .relation-display .rl-label {
            font-size: 0.35rem;
            text-transform: uppercase;
            color: #6688aa;
            letter-spacing: 1px;
        }
        .relation-display .rl-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            color: #ffb432;
        }
        
        @media (max-width: 768px) {
            .header { top: 8px; padding: 4px 16px; }
            .header .title { font-size: 0.8rem; }
            .info-panel { top: 55px; left: 8px; min-width: 120px; max-width: 160px; padding: 6px 10px; }
            .info-panel .value { font-size: 0.55rem; }
            .info-panel .equation { font-size: 0.4rem; }
            .main-panel { bottom: 45px; padding: 8px 12px; min-width: 280px; max-height: 50vh; }
            .mode-btn { font-size: 0.4rem; padding: 2px 8px; }
            .btn { font-size: 0.4rem; padding: 3px 6px; }
            .slider-group { min-width: 70px; }
            .slider-group label { font-size: 0.4rem; }
            .slider-group .slider-val { font-size: 0.5rem; min-width: 30px; }
            .relation-display { bottom: 100px; right: 8px; padding: 4px 8px; }
            .relation-display .rl-value { font-size: 0.5rem; }
        }
        @media (max-width: 480px) {
            .info-panel { display: none; }
            .main-panel { bottom: 40px; padding: 6px 8px; min-width: 200px; max-height: 55vh; }
            .mode-btn { font-size: 0.35rem; padding: 1px 5px; }
            .btn { font-size: 0.35rem; padding: 2px 4px; }
            .slider-group { min-width: 50px; }
            .slider-group input[type="range"] { height: 2px; }
            .slider-group input[type="range"]::-webkit-slider-thumb { width: 10px; height: 10px; }
            .relation-display { bottom: 85px; right: 4px; padding: 2px 6px; }
            .relation-display .rl-value { font-size: 0.4rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">📐 Fazoda To'g'ri Chiziq va Tekislik</div>
        <div class="subtitle">3D Interaktiv Geometriya</div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <div class="label">📐 Ob'ekt</div>
        <div class="value" id="objectType" style="color:#ff6b6b;">To'g'ri chiziq</div>
        <div class="equation" id="equationDisplay">x = x₀ + at</div>
        <div class="desc" id="objectDesc">Parametrik tenglama</div>
    </div>
    
    <div class="relation-display">
        <div class="rl-label">📊 O'zaro munosabat</div>
        <div class="rl-value" id="relationValue">Chiziq ⊂ Tekislik</div>
    </div>
    
    <div class="main-panel">
        <div class="row">
            <div class="mode-buttons">
                <button class="mode-btn active-line" data-mode="line">🔴 To'g'ri chiziq</button>
                <button class="mode-btn" data-mode="plane">🔵 Tekislik</button>
                <button class="mode-btn" data-mode="both">🟢 Ikkalasi</button>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;">
            <div class="slider-group">
                <label>📍 X₀</label>
                <input type="range" id="sliderX0" min="-3" max="3" step="0.1" value="0">
                <span class="slider-val" id="sliderX0Val">0.0</span>
            </div>
            <div class="slider-group">
                <label>📍 Y₀</label>
                <input type="range" id="sliderY0" min="-3" max="3" step="0.1" value="0">
                <span class="slider-val" id="sliderY0Val">0.0</span>
            </div>
            <div class="slider-group">
                <label>📍 Z₀</label>
                <input type="range" id="sliderZ0" min="-3" max="3" step="0.1" value="0">
                <span class="slider-val" id="sliderZ0Val">0.0</span>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;">
            <div class="slider-group">
                <label>📌 a (yo'nalish)</label>
                <input type="range" id="sliderA" min="-2" max="2" step="0.1" value="1">
                <span class="slider-val" id="sliderAVal">1.0</span>
            </div>
            <div class="slider-group">
                <label>📌 b (yo'nalish)</label>
                <input type="range" id="sliderB" min="-2" max="2" step="0.1" value="0">
                <span class="slider-val" id="sliderBVal">0.0</span>
            </div>
            <div class="slider-group">
                <label>📌 c (yo'nalish)</label>
                <input type="range" id="sliderC" min="-2" max="2" step="0.1" value="1">
                <span class="slider-val" id="sliderCVal">1.0</span>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;gap:4px;">
            <button class="btn btn-blue btn-sm" id="btnParametric">📐 Parametrik</button>
            <button class="btn btn-purple btn-sm" id="btnSymmetric">📐 Simmetrik</button>
            <button class="btn btn-gold btn-sm" id="btnNormal">📐 Normal</button>
            <button class="btn btn-green btn-sm" id="btnAnimate">▶ Anim</button>
            <button class="btn btn-gray btn-sm" id="btnReset">↺ Reset</button>
        </div>
        
        <div class="row" style="margin-top:4px;font-size:0.4rem;color:#445566;font-family:'JetBrains Mono',monospace;text-align:center;width:100%;" id="formulaDisplay">
            r(t) = (0,0,0) + t·(1,0,1)
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ========== THREE.JS SCENE ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080818);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(4, 3, 6);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 2;
        controls.maxDistance = 15;
        
        // --- Lights ---
        const ambient = new THREE.AmbientLight(0x223355, 0.5);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x64c8ff, 0.15);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);
        
        // --- Ground ---
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x080818, 
            roughness: 0.9, 
            metalness: 0.05, 
            transparent: true, 
            opacity: 0.3 
        });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(6, 32), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- Grid ---
        const gridHelper = new THREE.GridHelper(10, 10, 0x4488ff, 0x224488);
        gridHelper.position.y = -0.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.08;
        scene.add(gridHelper);
        
        // --- Axes ---
        const axesHelper = new THREE.AxesHelper(4);
        axesHelper.material.transparent = true;
        axesHelper.material.opacity = 0.3;
        scene.add(axesHelper);
        
        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 80 + 10;
            starPos[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.05, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ========== STATE ==========
        let mode = 'line';
        let x0 = 0, y0 = 0, z0 = 0;
        let a = 1, b = 0, c = 1;
        let isAnimating = false;
        let animationId = null;
        let animTime = 0;
        
        let lineObject = null;
        let planeObject = null;
        let pointObject = null;
        
        // ========== CREATE GEOMETRY ==========
        function createLine() {
            // Remove old line
            if (lineObject) {
                scene.remove(lineObject);
                lineObject = null;
            }
            
            const points = [];
            const tRange = 4;
            const segments = 100;
            
            for (let i = 0; i <= segments; i++) {
                const t = -tRange + (i / segments) * 2 * tRange;
                const x = x0 + a * t;
                const y = y0 + b * t;
                const z = z0 + c * t;
                points.push(new THREE.Vector3(x, y, z));
            }
            
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: 0xff6b6b, 
                linewidth: 2,
                transparent: true,
                opacity: 0.9
            });
            lineObject = new THREE.Line(geometry, material);
            scene.add(lineObject);
            
            // Glow line
            const glowMat = new THREE.LineBasicMaterial({
                color: 0xff6b6b,
                transparent: true,
                opacity: 0.15
            });
            const glowLine = new THREE.Line(geometry.clone(), glowMat);
            glowLine.position.y = -0.02;
            scene.add(glowLine);
            lineObject.userData.glow = glowLine;
            
            // Add point on line
            if (pointObject) {
                scene.remove(pointObject);
                pointObject = null;
            }
            const pointMat = new THREE.MeshStandardMaterial({
                color: 0xffb432,
                emissive: 0xff8833,
                emissiveIntensity: 0.3,
                metalness: 0.3,
                roughness: 0.2
            });
            pointObject = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), pointMat);
            pointObject.position.set(x0, y0, z0);
            scene.add(pointObject);
            
            // Point glow
            const pGlowMat = new THREE.MeshBasicMaterial({
                color: 0xffb432,
                transparent: true,
                opacity: 0.1
            });
            const pGlow = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), pGlowMat);
            pointObject.add(pGlow);
        }
        
        function createPlane() {
            // Remove old plane
            if (planeObject) {
                scene.remove(planeObject);
                planeObject = null;
            }
            
            // Plane normal: cross product of direction vectors
            // Use a and b as direction vectors
            const d1 = new THREE.Vector3(a, b, c);
            const d2 = new THREE.Vector3(a + 1, b, c);
            const normal = new THREE.Vector3().crossVectors(d1, d2);
            if (normal.length() < 0.01) {
                normal.set(0, 1, 0);
            }
            normal.normalize();
            
            // Create plane geometry
            const size = 3;
            const planeGeo = new THREE.PlaneGeometry(size * 2, size * 2);
            const planeMat = new THREE.MeshBasicMaterial({
                color: 0x64c8ff,
                transparent: true,
                opacity: 0.15,
                side: THREE.DoubleSide,
                wireframe: false
            });
            planeObject = new THREE.Mesh(planeGeo, planeMat);
            
            // Position and orient plane
            const center = new THREE.Vector3(x0, y0, z0);
            planeObject.position.copy(center);
            
            // Orient plane to normal
            const up = new THREE.Vector3(0, 1, 0);
            const quat = new THREE.Quaternion().setFromUnitVectors(up, normal);
            planeObject.quaternion.copy(quat);
            
            scene.add(planeObject);
            
            // Add wireframe
            const wireMat = new THREE.LineBasicMaterial({
                color: 0x64c8ff,
                transparent: true,
                opacity: 0.1
            });
            const wireGeo = new THREE.WireframeGeometry(planeGeo);
            const wireLine = new THREE.LineSegments(wireGeo, wireMat);
            wireLine.position.copy(planeObject.position);
            wireLine.quaternion.copy(planeObject.quaternion);
            scene.add(wireLine);
            planeObject.userData.wire = wireLine;
            
            // Add normal vector
            const normalArrow = new THREE.ArrowHelper(
                normal, 
                center, 
                0.8, 
                0xffb432, 
                0.3, 
                0.15
            );
            scene.add(normalArrow);
            planeObject.userData.normalArrow = normalArrow;
        }
        
        function removeObjects() {
            if (lineObject) {
                if (lineObject.userData.glow) {
                    scene.remove(lineObject.userData.glow);
                }
                scene.remove(lineObject);
                lineObject = null;
            }
            if (pointObject) {
                scene.remove(pointObject);
                pointObject = null;
            }
            if (planeObject) {
                if (planeObject.userData.wire) {
                    scene.remove(planeObject.userData.wire);
                }
                if (planeObject.userData.normalArrow) {
                    scene.remove(planeObject.userData.normalArrow);
                }
                scene.remove(planeObject);
                planeObject = null;
            }
        }
        
        // ========== UPDATE SCENE ==========
        function updateScene() {
            removeObjects();
            
            if (mode === 'line' || mode === 'both') {
                createLine();
            }
            if (mode === 'plane' || mode === 'both') {
                createPlane();
            }
            
            // Update UI
            const modeNames = {
                'line': 'To\'g\'ri chiziq',
                'plane': 'Tekislik',
                'both': 'Chiziq va tekislik'
            };
            const modeColors = {
                'line': '#ff6b6b',
                'plane': '#64c8ff',
                'both': '#34d399'
            };
            document.getElementById('objectType').textContent = modeNames[mode];
            document.getElementById('objectType').style.color = modeColors[mode];
            
            let equation = '';
            let desc = '';
            if (mode === 'line' || mode === 'both') {
                equation = `(x,y,z) = (${x0.toFixed(1)},${y0.toFixed(1)},${z0.toFixed(1)}) + t·(${a.toFixed(1)},${b.toFixed(1)},${c.toFixed(1)})`;
                desc = 'Parametrik tenglama';
                document.getElementById('formulaDisplay').innerHTML = `r(t) = (${x0.toFixed(1)},${y0.toFixed(1)},${z0.toFixed(1)}) + t·(${a.toFixed(1)},${b.toFixed(1)},${c.toFixed(1)})`;
            } else {
                const normal = new THREE.Vector3(a, b, c).normalize();
                const d = -(normal.x * x0 + normal.y * y0 + normal.z * z0);
                equation = `${normal.x.toFixed(2)}x + ${normal.y.toFixed(2)}y + ${normal.z.toFixed(2)}z + ${d.toFixed(2)} = 0`;
                desc = 'Normal tenglama';
                document.getElementById('formulaDisplay').innerHTML = equation;
            }
            document.getElementById('equationDisplay').textContent = equation;
            document.getElementById('objectDesc').textContent = desc;
            
            // Update relation
            if (mode === 'line') {
                document.getElementById('relationValue').textContent = 'Chiziq ⊂ Fazoda';
                document.getElementById('relationValue').style.color = '#ff6b6b';
            } else if (mode === 'plane') {
                document.getElementById('relationValue').textContent = 'Tekislik ⊂ Fazoda';
                document.getElementById('relationValue').style.color = '#64c8ff';
            } else {
                document.getElementById('relationValue').textContent = 'Chiziq ∩ Tekislik = {P₀}';
                document.getElementById('relationValue').style.color = '#34d399';
            }
        }
        
        // ========== UPDATE FROM SLIDERS ==========
        function updateFromSliders() {
            x0 = parseFloat(document.getElementById('sliderX0').value);
            y0 = parseFloat(document.getElementById('sliderY0').value);
            z0 = parseFloat(document.getElementById('sliderZ0').value);
            a = parseFloat(document.getElementById('sliderA').value);
            b = parseFloat(document.getElementById('sliderB').value);
            c = parseFloat(document.getElementById('sliderC').value);
            
            document.getElementById('sliderX0Val').textContent = x0.toFixed(1);
            document.getElementById('sliderY0Val').textContent = y0.toFixed(1);
            document.getElementById('sliderZ0Val').textContent = z0.toFixed(1);
            document.getElementById('sliderAVal').textContent = a.toFixed(1);
            document.getElementById('sliderBVal').textContent = b.toFixed(1);
            document.getElementById('sliderCVal').textContent = c.toFixed(1);
            
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        }
        
        // ========== SLIDERS ==========
        document.getElementById('sliderX0').addEventListener('input', updateFromSliders);
        document.getElementById('sliderY0').addEventListener('input', updateFromSliders);
        document.getElementById('sliderZ0').addEventListener('input', updateFromSliders);
        document.getElementById('sliderA').addEventListener('input', updateFromSliders);
        document.getElementById('sliderB').addEventListener('input', updateFromSliders);
        document.getElementById('sliderC').addEventListener('input', updateFromSliders);
        
        // ========== MODE BUTTONS ==========
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => {
                    b.className = 'mode-btn';
                });
                mode = btn.dataset.mode;
                btn.classList.add('active-' + mode);
                if (isAnimating) {
                    isAnimating = false;
                    if (animationId) cancelAnimationFrame(animationId);
                    document.getElementById('btnAnimate').textContent = '▶ Anim';
                }
                updateScene();
            });
        });
        
        // ========== EQUATION BUTTONS ==========
        document.getElementById('btnParametric').addEventListener('click', () => {
            const eq = `r(t) = (${x0.toFixed(1)},${y0.toFixed(1)},${z0.toFixed(1)}) + t·(${a.toFixed(1)},${b.toFixed(1)},${c.toFixed(1)})`;
            document.getElementById('equationDisplay').textContent = eq;
            document.getElementById('formulaDisplay').innerHTML = eq;
            setTimeout(() => updateScene(), 1500);
        });
        
        document.getElementById('btnSymmetric').addEventListener('click', () => {
            if (a !== 0 && b !== 0 && c !== 0) {
                const eq = `(x-${x0.toFixed(1)})/${a.toFixed(1)} = (y-${y0.toFixed(1)})/${b.toFixed(1)} = (z-${z0.toFixed(1)})/${c.toFixed(1)}`;
                document.getElementById('equationDisplay').textContent = eq;
                document.getElementById('formulaDisplay').innerHTML = eq;
            } else {
                alert('Simmetrik tenglama uchun a, b, c ≠ 0 bo\'lishi kerak!');
            }
            setTimeout(() => updateScene(), 1500);
        });
        
        document.getElementById('btnNormal').addEventListener('click', () => {
            if (mode === 'plane' || mode === 'both') {
                const normal = new THREE.Vector3(a, b, c).normalize();
                const d = -(normal.x * x0 + normal.y * y0 + normal.z * z0);
                const eq = `${normal.x.toFixed(2)}x + ${normal.y.toFixed(2)}y + ${normal.z.toFixed(2)}z + ${d.toFixed(2)} = 0`;
                document.getElementById('equationDisplay').textContent = eq;
                document.getElementById('formulaDisplay').innerHTML = eq;
            } else {
                alert('Normal tenglama faqat tekislik uchun!');
            }
            setTimeout(() => updateScene(), 1500);
        });
        
        // ========== ANIMATION ==========
        document.getElementById('btnAnimate').addEventListener('click', () => {
            isAnimating = !isAnimating;
            document.getElementById('btnAnimate').textContent = isAnimating ? '⏹ Stop' : '▶ Anim';
            if (isAnimating) {
                animTime = 0;
                const startX0 = x0, startY0 = y0, startZ0 = z0;
                const startTime = performance.now();
                const duration = 6000;
                
                function animateObjects(time) {
                    if (!isAnimating) return;
                    const progress = Math.min(1, (time - startTime) / duration);
                    const eased = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    
                    // Move point along line
                    const t = eased * 6 - 3;
                    const x = x0 + a * t;
                    const y = y0 + b * t;
                    const z = z0 + c * t;
                    
                    if (pointObject) {
                        pointObject.position.set(x, y, z);
                    }
                    
                    // Update line
                    if (lineObject) {
                        const points = [];
                        const tRange = 4;
                        const segments = 100;
                        for (let i = 0; i <= segments; i++) {
                            const ti = -tRange + (i / segments) * 2 * tRange;
                            const px = x0 + a * ti;
                            const py = y0 + b * ti;
                            const pz = z0 + c * ti;
                            points.push(new THREE.Vector3(px, py, pz));
                        }
                        lineObject.geometry.dispose();
                        lineObject.geometry = new THREE.BufferGeometry().setFromPoints(points);
                        if (lineObject.userData.glow) {
                            lineObject.userData.glow.geometry.dispose();
                            lineObject.userData.glow.geometry = new THREE.BufferGeometry().setFromPoints(points);
                        }
                    }
                    
                    if (progress < 1) {
                        animationId = requestAnimationFrame(animateObjects);
                    } else {
                        isAnimating = false;
                        document.getElementById('btnAnimate').textContent = '▶ Anim';
                        updateScene();
                    }
                }
                animationId = requestAnimationFrame(animateObjects);
            } else {
                if (animationId) cancelAnimationFrame(animationId);
                updateScene();
            }
        });
        
        // ========== RESET ==========
        document.getElementById('btnReset').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            x0 = 0; y0 = 0; z0 = 0;
            a = 1; b = 0; c = 1;
            document.getElementById('sliderX0').value = 0;
            document.getElementById('sliderY0').value = 0;
            document.getElementById('sliderZ0').value = 0;
            document.getElementById('sliderA').value = 1;
            document.getElementById('sliderB').value = 0;
            document.getElementById('sliderC').value = 1;
            mode = 'line';
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.className = 'mode-btn';
            });
            document.querySelector('[data-mode="line"]').classList.add('active-line');
            updateFromSliders();
        });
        
        // ========== RESIZE ==========
        function resizeCanvas() {}
        window.addEventListener('resize', resizeCanvas);
        
        // ========== 3D ANIMATION LOOP ==========
        function animate3D() {
            requestAnimationFrame(animate3D);
            
            const time = performance.now() / 1000;
            
            // Rotate stars
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // ========== INIT ==========
        updateFromSliders();
        animate3D();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('📐 Fazoda To\'g\'ri Chiziq va Tekislik | 3D Laboratoriya');
        console.log('📊 Chiziq: r(t) = r₀ + t·v');
        console.log('📊 Tekislik: n·(r - r₀) = 0');
    </script>
</body>
</html>
