<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Atom Tuzilishi va Davriy Qonun | 3D Interaktiv</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #080818;
            color: #f0f4ff;
        }
        canvas { display: block; }
        
        .header {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 24, 0.94);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 8px 28px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            z-index: 30;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
        }
        .header .title {
            font-size: 1.1rem;
            font-weight: 900;
            background: linear-gradient(135deg, #64c8ff, #a855f7, #ff6b6b, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle {
            font-size: 0.5rem;
            color: #6688aa;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .main-panel {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 8, 24, 0.92);
            backdrop-filter: blur(24px);
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 25;
            min-width: 340px;
            max-width: 700px;
            width: 94%;
            pointer-events: auto;
            max-height: 50vh;
            overflow-y: auto;
        }
        .main-panel::-webkit-scrollbar { width: 2px; }
        .main-panel::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .main-panel::-webkit-scrollbar-thumb { background: #64c8ff; border-radius: 4px; }
        .main-panel .row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2px 0;
        }
        
        .slider-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            min-width: 80px;
        }
        .slider-group label {
            font-size: 0.4rem;
            font-weight: 700;
            color: #6688aa;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .slider-group input[type="range"] {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(90deg, #64c8ff, #a855f7);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #64c8ff, #3b82f6);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(100,200,255,0.3);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .slider-group .slider-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            font-weight: 700;
            color: #64c8ff;
            min-width: 25px;
            text-align: center;
        }
        
        .btn {
            padding: 4px 10px;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.45rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(100,200,255,0.15); }
        .btn-blue { background: linear-gradient(135deg, #64c8ff, #3b82f6); color: white; }
        .btn-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); color: white; }
        .btn-red { background: linear-gradient(135deg, #ff6b6b, #dc2626); color: white; }
        .btn-green { background: linear-gradient(135deg, #34d399, #059669); color: white; }
        .btn-gold { background: linear-gradient(135deg, #ffb432, #f59e0b); color: #1a0a0a; }
        .btn-gray { background: rgba(80,100,140,0.15); color: #88aacc; border: 1px solid rgba(255,255,255,0.05); }
        .btn-gray:hover { background: rgba(80,100,140,0.3); }
        .btn-sm { font-size: 0.35rem; padding: 2px 6px; }
        
        .element-buttons {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .elem-btn {
            padding: 2px 8px;
            border: 2px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            color: #88aacc;
            font-size: 0.45rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .elem-btn:hover { background: rgba(255,255,255,0.05); transform: scale(1.05); }
        .elem-btn.active { border-color: #ffb432; color: #ffb432; background: rgba(255,180,50,0.1); }
        
        .info-panel {
            position: absolute;
            top: 60px;
            left: 16px;
            background: rgba(8, 8, 24, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 10px 14px;
            border: 1px solid rgba(100, 200, 255, 0.08);
            z-index: 20;
            pointer-events: none;
            min-width: 150px;
            max-width: 200px;
        }
        .info-panel .label {
            font-size: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #6688aa;
            font-weight: 700;
        }
        .info-panel .value {
            font-size: 0.6rem;
            font-weight: 700;
            margin-top: 1px;
        }
        .info-panel .element-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            margin: 2px 0;
        }
        .info-panel .element-name {
            font-size: 0.5rem;
            color: #88aacc;
        }
        .info-panel .element-detail {
            font-size: 0.4rem;
            color: #6688aa;
            margin-top: 2px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .periodic-table-btn {
            position: absolute;
            bottom: 120px;
            right: 16px;
            background: rgba(8, 8, 24, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 12px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.04);
            z-index: 18;
            pointer-events: none;
            text-align: center;
        }
        .periodic-table-btn .pt-label {
            font-size: 0.3rem;
            text-transform: uppercase;
            color: #6688aa;
            letter-spacing: 1px;
        }
        .periodic-table-btn .pt-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: #ffb432;
        }
        
        @media (max-width: 768px) {
            .header { top: 8px; padding: 4px 16px; }
            .header .title { font-size: 0.8rem; }
            .info-panel { top: 50px; left: 8px; min-width: 110px; max-width: 150px; padding: 6px 10px; }
            .info-panel .element-symbol { font-size: 1.0rem; }
            .info-panel .value { font-size: 0.5rem; }
            .main-panel { bottom: 40px; padding: 6px 10px; min-width: 280px; max-height: 55vh; }
            .elem-btn { font-size: 0.4rem; padding: 1px 6px; }
            .btn { font-size: 0.4rem; padding: 3px 6px; }
            .slider-group { min-width: 60px; }
            .slider-group label { font-size: 0.35rem; }
            .slider-group .slider-val { font-size: 0.45rem; min-width: 20px; }
            .periodic-table-btn { bottom: 100px; right: 8px; padding: 4px 8px; }
            .periodic-table-btn .pt-value { font-size: 0.45rem; }
        }
        @media (max-width: 480px) {
            .info-panel { top: 45px; left: 4px; min-width: 80px; max-width: 110px; padding: 4px 6px; }
            .info-panel .element-symbol { font-size: 0.8rem; }
            .info-panel .element-name { font-size: 0.4rem; }
            .main-panel { bottom: 35px; padding: 4px 6px; min-width: 200px; max-height: 60vh; }
            .elem-btn { font-size: 0.35rem; padding: 1px 4px; }
            .btn { font-size: 0.35rem; padding: 2px 4px; }
            .slider-group { min-width: 40px; }
            .slider-group input[type="range"] { height: 2px; }
            .slider-group input[type="range"]::-webkit-slider-thumb { width: 10px; height: 10px; }
            .periodic-table-btn { bottom: 85px; right: 4px; padding: 2px 6px; }
            .periodic-table-btn .pt-value { font-size: 0.4rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">⚛️ Atom Tuzilishi va Davriy Qonun</div>
        <div class="subtitle">3D Interaktiv Laboratoriya</div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <div class="label">🔬 Element</div>
        <div class="element-symbol" id="elementSymbol" style="color:#ffb432;">H</div>
        <div class="element-name" id="elementName">Vodorod</div>
        <div class="value" id="elementDetails">Z=1, n=0</div>
        <div class="element-detail" id="electronConfig">1s¹</div>
        <div class="element-detail" id="periodGroup">1-davr, 1-guruh</div>
    </div>
    
    <div class="periodic-table-btn">
        <div class="pt-label">📊 Davriy jadval</div>
        <div class="pt-value" id="ptPosition">H · 1-davr · 1-guruh</div>
    </div>
    
    <div class="main-panel">
        <div class="row">
            <div class="element-buttons" id="elementButtons">
                <button class="elem-btn active" data-element="H">H</button>
                <button class="elem-btn" data-element="He">He</button>
                <button class="elem-btn" data-element="Li">Li</button>
                <button class="elem-btn" data-element="C">C</button>
                <button class="elem-btn" data-element="N">N</button>
                <button class="elem-btn" data-element="O">O</button>
                <button class="elem-btn" data-element="Na">Na</button>
                <button class="elem-btn" data-element="Cl">Cl</button>
                <button class="elem-btn" data-element="K">K</button>
                <button class="elem-btn" data-element="Ca">Ca</button>
                <button class="elem-btn" data-element="Fe">Fe</button>
                <button class="elem-btn" data-element="Cu">Cu</button>
                <button class="elem-btn" data-element="Zn">Zn</button>
                <button class="elem-btn" data-element="Br">Br</button>
                <button class="elem-btn" data-element="Ag">Ag</button>
                <button class="elem-btn" data-element="Au">Au</button>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;">
            <div class="slider-group">
                <label>⚛️ Proton</label>
                <input type="range" id="sliderProton" min="1" max="118" step="1" value="1">
                <span class="slider-val" id="sliderProtonVal">1</span>
            </div>
            <div class="slider-group">
                <label>⚛️ Neytron</label>
                <input type="range" id="sliderNeutron" min="0" max="180" step="1" value="0">
                <span class="slider-val" id="sliderNeutronVal">0</span>
            </div>
        </div>
        
        <div class="row" style="margin-top:4px;gap:4px;">
            <button class="btn btn-blue btn-sm" id="btnShells">🔵 Qavatlar</button>
            <button class="btn btn-purple btn-sm" id="btnOrbitals">🟣 Orbitallar</button>
            <button class="btn btn-green btn-sm" id="btnAnimate">▶ Anim</button>
            <button class="btn btn-gold btn-sm" id="btnReset">↺ Reset</button>
            <button class="btn btn-red btn-sm" id="btnRandom">🎲 Random</button>
        </div>
        
        <div class="row" style="margin-top:3px;font-size:0.35rem;color:#445566;font-family:'JetBrains Mono',monospace;text-align:center;width:100%;" id="formulaDisplay">
            ⚛️ Atom: proton=1, neytron=0, elektron=1
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ========== ELEMENT DATA ==========
        const elements = {
            H: { name: 'Vodorod', symbol: 'H', z: 1, period: 1, group: 1, config: '1s¹', color: 0xffb432 },
            He: { name: 'Geliy', symbol: 'He', z: 2, period: 1, group: 18, config: '1s²', color: 0x64c8ff },
            Li: { name: 'Litiy', symbol: 'Li', z: 3, period: 2, group: 1, config: '1s²2s¹', color: 0x34d399 },
            C: { name: 'Uglerod', symbol: 'C', z: 6, period: 2, group: 14, config: '1s²2s²2p²', color: 0x445566 },
            N: { name: 'Azot', symbol: 'N', z: 7, period: 2, group: 15, config: '1s²2s²2p³', color: 0x64c8ff },
            O: { name: 'Kislorod', symbol: 'O', z: 8, period: 2, group: 16, config: '1s²2s²2p⁴', color: 0xff6b6b },
            Na: { name: 'Natriy', symbol: 'Na', z: 11, period: 3, group: 1, config: '1s²2s²2p⁶3s¹', color: 0x34d399 },
            Cl: { name: 'Xlor', symbol: 'Cl', z: 17, period: 3, group: 17, config: '1s²2s²2p⁶3s²3p⁵', color: 0x64c8ff },
            K: { name: 'Kaliy', symbol: 'K', z: 19, period: 4, group: 1, config: '1s²2s²2p⁶3s²3p⁶4s¹', color: 0x34d399 },
            Ca: { name: 'Kaltsiy', symbol: 'Ca', z: 20, period: 4, group: 2, config: '1s²2s²2p⁶3s²3p⁶4s²', color: 0x34d399 },
            Fe: { name: 'Temir', symbol: 'Fe', z: 26, period: 4, group: 8, config: '1s²2s²2p⁶3s²3p⁶3d⁶4s²', color: 0xff6b6b },
            Cu: { name: 'Mis', symbol: 'Cu', z: 29, period: 4, group: 11, config: '1s²2s²2p⁶3s²3p⁶3d¹⁰4s¹', color: 0xffb432 },
            Zn: { name: 'Rux', symbol: 'Zn', z: 30, period: 4, group: 12, config: '1s²2s²2p⁶3s²3p⁶3d¹⁰4s²', color: 0x445566 },
            Br: { name: 'Brom', symbol: 'Br', z: 35, period: 4, group: 17, config: '1s²2s²2p⁶3s²3p⁶3d¹⁰4s²4p⁵', color: 0x64c8ff },
            Ag: { name: 'Kumush', symbol: 'Ag', z: 47, period: 5, group: 11, config: '1s²2s²2p⁶3s²3p⁶3d¹⁰4s²4p⁶4d¹⁰5s¹', color: 0xffb432 },
            Au: { name: 'Oltin', symbol: 'Au', z: 79, period: 6, group: 11, config: '1s²2s²2p⁶3s²3p⁶3d¹⁰4s²4p⁶4d¹⁰4f¹⁴5s²5p⁶5d¹⁰6s¹', color: 0xffb432 }
        };
        
        // ========== THREE.JS SCENE ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x080818);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.5, 5);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.zoomSpeed = 0.8;
        controls.rotateSpeed = 0.5;
        controls.target.set(0, 0, 0);
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 2;
        controls.maxDistance = 15;
        
        // --- Lights ---
        const ambient = new THREE.AmbientLight(0x223355, 0.5);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.4);
        mainLight.position.set(5, 8, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.DirectionalLight(0x4488ff, 0.3);
        fillLight.position.set(-3, 2, -4);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x64c8ff, 0.15);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);
        
        // --- Ground ---
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x080818, 
            roughness: 0.9, 
            metalness: 0.05, 
            transparent: true, 
            opacity: 0.3 
        });
        const ground = new THREE.Mesh(new THREE.CircleGeometry(5, 32), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // --- Grid ---
        const gridHelper = new THREE.GridHelper(8, 8, 0x4488ff, 0x224488);
        gridHelper.position.y = -0.4;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.06;
        scene.add(gridHelper);
        
        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPos = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 80 + 10;
            starPos[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.04, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // ========== ATOM MODEL ==========
        let atomGroup = new THREE.Group();
        scene.add(atomGroup);
        
        let nucleus = null;
        let electrons = [];
        let electronShells = [];
        let isAnimating = false;
        let animationId = null;
        let currentElement = 'H';
        let protonCount = 1;
        let neutronCount = 0;
        
        // ========== BUILD ATOM ==========
        function buildAtom(z, n) {
            // Clear old atom
            while(atomGroup.children.length > 0) {
                atomGroup.remove(atomGroup.children[0]);
            }
            electrons = [];
            electronShells = [];
            
            const total = z + n;
            
            // --- Nucleus ---
            const nucleusMat = new THREE.MeshStandardMaterial({
                color: 0xff6b6b,
                emissive: 0xff4411,
                emissiveIntensity: 0.2,
                metalness: 0.3,
                roughness: 0.2
            });
            const nucleusSize = 0.25 + z * 0.015;
            nucleus = new THREE.Mesh(new THREE.SphereGeometry(nucleusSize, 32, 32), nucleusMat);
            nucleus.castShadow = true;
            atomGroup.add(nucleus);
            
            // Nucleus glow
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0xff6b6b,
                transparent: true,
                opacity: 0.08
            });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(nucleusSize * 1.8, 16, 16), glowMat);
            nucleus.add(glow);
            
            // Proton/neutron labels on nucleus
            const labelDiv = document.createElement('div');
            labelDiv.textContent = `${z}p⁺ ${n}n⁰`;
            labelDiv.style.color = '#ffb432';
            labelDiv.style.fontSize = '8px';
            labelDiv.style.fontWeight = '700';
            labelDiv.style.fontFamily = 'JetBrains Mono, monospace';
            labelDiv.style.textShadow = '0 0 20px rgba(0,0,0,0.9)';
            labelDiv.style.background = 'rgba(8,8,24,0.6)';
            labelDiv.style.padding = '1px 8px';
            labelDiv.style.borderRadius = '12px';
            labelDiv.style.border = '1px solid rgba(255,180,50,0.1)';
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, nucleusSize + 0.3, 0);
            nucleus.add(label);
            
            // --- Electron shells ---
            const shellData = getShellData(z);
            const maxShells = shellData.length;
            
            shellData.forEach((shell, index) => {
                const shellRadius = 0.8 + index * 0.6 + z * 0.02;
                const shellElec = shell;
                
                // Shell ring
                const ringMat = new THREE.LineBasicMaterial({
                    color: 0x4488ff,
                    transparent: true,
                    opacity: 0.1
                });
                const ringPoints = [];
                for (let i = 0; i <= 64; i++) {
                    const theta = (i / 64) * Math.PI * 2;
                    ringPoints.push(new THREE.Vector3(
                        Math.cos(theta) * shellRadius,
                        0,
                        Math.sin(theta) * shellRadius
                    ));
                }
                const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
                const ring = new THREE.Line(ringGeo, ringMat);
                atomGroup.add(ring);
                
                // Shell label
                const shellDiv = document.createElement('div');
                shellDiv.textContent = `n=${index+1}`;
                shellDiv.style.color = '#4488ff';
                shellDiv.style.fontSize = '6px';
                shellDiv.style.fontWeight = '600';
                shellDiv.style.fontFamily = 'JetBrains Mono, monospace';
                shellDiv.style.opacity = '0.5';
                const shellLabel = new CSS2DObject(shellDiv);
                shellLabel.position.set(shellRadius + 0.3, 0, 0);
                atomGroup.add(shellLabel);
                
                // Electrons on this shell
                const elecCount = Math.min(shellElec, 8);
                for (let i = 0; i < elecCount; i++) {
                    const angle = (i / elecCount) * Math.PI * 2 + index * 0.5;
                    const tilt = 0.3 + index * 0.1;
                    const pos = new THREE.Vector3(
                        Math.cos(angle) * shellRadius,
                        Math.sin(angle * 0.7) * tilt * 0.5,
                        Math.sin(angle) * shellRadius
                    );
                    
                    const elecMat = new THREE.MeshStandardMaterial({
                        color: 0x64c8ff,
                        emissive: 0x4488ff,
                        emissiveIntensity: 0.3,
                        metalness: 0.2,
                        roughness: 0.1
                    });
                    const electron = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), elecMat);
                    electron.position.copy(pos);
                    electron.userData = {
                        shellRadius: shellRadius,
                        angle: angle,
                        speed: 0.5 + Math.random() * 0.5,
                        tilt: tilt,
                        phase: Math.random() * Math.PI * 2
                    };
                    atomGroup.add(electron);
                    electrons.push(electron);
                    
                    // Electron glow
                    const eGlowMat = new THREE.MeshBasicMaterial({
                        color: 0x64c8ff,
                        transparent: true,
                        opacity: 0.05
                    });
                    const eGlow = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), eGlowMat);
                    electron.add(eGlow);
                }
                
                electronShells.push({ radius: shellRadius, count: elecCount });
            });
        }
        
        // ========== GET SHELL DATA ==========
        function getShellData(z) {
            // Electron configuration by shells (1s, 2s, 2p, 3s, 3p, 3d, 4s, 4p, 4d, 4f, ...)
            const shells = [0, 0, 0, 0, 0, 0, 0];
            let remaining = z;
            
            const shellCapacities = [2, 8, 8, 18, 18, 32, 32];
            for (let i = 0; i < shellCapacities.length && remaining > 0; i++) {
                shells[i] = Math.min(remaining, shellCapacities[i]);
                remaining -= shells[i];
            }
            
            return shells.filter(s => s > 0);
        }
        
        // ========== UPDATE SCENE ==========
        function updateScene() {
            const element = elements[currentElement];
            if (element) {
                protonCount = element.z;
                // Default neutron count for stability
                neutronCount = Math.round(protonCount * 1.1);
                document.getElementById('sliderProton').value = protonCount;
                document.getElementById('sliderNeutron').value = neutronCount;
                document.getElementById('sliderProtonVal').textContent = protonCount;
                document.getElementById('sliderNeutronVal').textContent = neutronCount;
            }
            
            buildAtom(protonCount, neutronCount);
            updateUI();
        }
        
        // ========== UPDATE UI ==========
        function updateUI() {
            const element = elements[currentElement];
            if (!element) return;
            
            const color = '#' + element.color.toString(16).padStart(6, '0');
            document.getElementById('elementSymbol').textContent = element.symbol;
            document.getElementById('elementSymbol').style.color = color;
            document.getElementById('elementName').textContent = element.name;
            document.getElementById('elementDetails').textContent = `Z=${element.z}, n=${neutronCount}`;
            document.getElementById('electronConfig').textContent = element.config;
            document.getElementById('periodGroup').textContent = `${element.period}-davr, ${element.group}-guruh`;
            document.getElementById('ptPosition').textContent = `${element.symbol} · ${element.period}-davr · ${element.group}-guruh`;
            document.getElementById('formulaDisplay').innerHTML = 
                `⚛️ Atom: proton=${protonCount}, neytron=${neutronCount}, elektron=${protonCount}`;
            
            // Update active button
            document.querySelectorAll('.elem-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.element === currentElement) {
                    btn.classList.add('active');
                }
            });
        }
        
        // ========== ELEMENT BUTTONS ==========
        document.querySelectorAll('.elem-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentElement = btn.dataset.element;
                if (isAnimating) {
                    isAnimating = false;
                    if (animationId) cancelAnimationFrame(animationId);
                    document.getElementById('btnAnimate').textContent = '▶ Anim';
                }
                updateScene();
            });
        });
        
        // ========== SLIDERS ==========
        document.getElementById('sliderProton').addEventListener('input', (e) => {
            protonCount = parseInt(e.target.value);
            document.getElementById('sliderProtonVal').textContent = protonCount;
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            // Find matching element
            let found = false;
            for (const [key, el] of Object.entries(elements)) {
                if (el.z === protonCount) {
                    currentElement = key;
                    found = true;
                    break;
                }
            }
            if (!found) {
                // Custom element
                currentElement = null;
            }
            updateScene();
        });
        
        document.getElementById('sliderNeutron').addEventListener('input', (e) => {
            neutronCount = parseInt(e.target.value);
            document.getElementById('sliderNeutronVal').textContent = neutronCount;
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            updateScene();
        });
        
        // ========== BUTTONS ==========
        document.getElementById('btnShells').addEventListener('click', () => {
            const shellInfo = electronShells.map((s, i) => 
                `n=${i+1}: ${s.count} elektron`
            ).join('\n');
            alert(`📊 Elektron qavatlar:\n${shellInfo}\n\nJami: ${protonCount} elektron`);
        });
        
        document.getElementById('btnOrbitals').addEventListener('click', () => {
            const element = elements[currentElement];
            if (element) {
                alert(`🟣 Orbital konfiguratsiya:\n${element.config}\n\n${element.name} (${element.symbol})\nZ=${element.z}`);
            }
        });
        
        document.getElementById('btnAnimate').addEventListener('click', () => {
            isAnimating = !isAnimating;
            document.getElementById('btnAnimate').textContent = isAnimating ? '⏹ Stop' : '▶ Anim';
            if (isAnimating) {
                // Animate electrons
                const startTime = performance.now();
                function animateElectrons(time) {
                    if (!isAnimating) return;
                    const dt = (time - startTime) / 1000;
                    electrons.forEach((electron, i) => {
                        const data = electron.userData;
                        const angle = data.angle + dt * data.speed * 0.3;
                        const tilt = data.tilt;
                        const radius = data.shellRadius;
                        const phase = data.phase || 0;
                        electron.position.x = Math.cos(angle + phase) * radius;
                        electron.position.z = Math.sin(angle + phase) * radius;
                        electron.position.y = Math.sin(angle * 0.7 + phase) * tilt * 0.5;
                    });
                    animationId = requestAnimationFrame(animateElectrons);
                }
                animationId = requestAnimationFrame(animateElectrons);
            } else {
                if (animationId) cancelAnimationFrame(animationId);
            }
        });
        
        document.getElementById('btnReset').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            currentElement = 'H';
            protonCount = 1;
            neutronCount = 0;
            document.getElementById('sliderProton').value = 1;
            document.getElementById('sliderNeutron').value = 0;
            document.getElementById('sliderProtonVal').textContent = '1';
            document.getElementById('sliderNeutronVal').textContent = '0';
            updateScene();
        });
        
        document.getElementById('btnRandom').addEventListener('click', () => {
            if (isAnimating) {
                isAnimating = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('btnAnimate').textContent = '▶ Anim';
            }
            const keys = Object.keys(elements);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            currentElement = randomKey;
            const el = elements[randomKey];
            protonCount = el.z;
            neutronCount = Math.round(protonCount * (0.8 + Math.random() * 0.6));
            document.getElementById('sliderProton').value = protonCount;
            document.getElementById('sliderNeutron').value = neutronCount;
            document.getElementById('sliderProtonVal').textContent = protonCount;
            document.getElementById('sliderNeutronVal').textContent = neutronCount;
            updateScene();
        });
        
        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ========== 3D ANIMATION LOOP ==========
        function animate3D() {
            requestAnimationFrame(animate3D);
            
            const time = performance.now() / 1000;
            
            // Rotate atom slightly
            atomGroup.rotation.y = Math.sin(time * 0.03) * 0.2;
            
            // Stars
            stars.rotation.y += 0.0001;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // ========== INIT ==========
        updateScene();
        animate3D();
        
        console.log('⚛️ Atom Tuzilishi va Davriy Qonun | 3D Laboratoriya');
        console.log('📊 Elementlarni tanlang va atom tuzilishini o\'rganing');
    </script>
</body>
</html>
